project:
  type: book
  output-dir: docs
  preview:
    port: 7771
    browser: false
  render:
    - "chapters/*.qmd"
    - "!*.Rmd"

lang: ko-KR

# ---------------------------------- #
book:
  title: "AI 에이전트 글쓰기"
  reader-mode: true
  subtitle: "에이전트가 저작을 바꾸는 과학기술 글쓰기"

  page-footer:
    left: |
      AI 에이전트 글쓰기 — 과학기술 저작
    right: |
      Built with <a href="https://quarto.org/">Quarto</a> · Powered by AI Agents

  cover-image: images/book_cover.jpg
  favicon: images/logo.png
  site-url: https://statkclee.github.io/gpt-agent/
  repo-url: https://github.com/statkclee/gpt-agent/
  repo-branch: main
  repo-actions: [edit, issue]

  google-analytics: "UA-229551680-1"
  author:
    - name: "이광춘"
      affiliations: "국가인공지능전략위원회 자문위원"
  date: last-modified
  date-format: "YYYY년 MM월 DD일"

# ---------------------------------- #
  chapters:
    - index.qmd

    - part: "**1부** AI 시대 프로그래밍"
      chapters:
        - chapters/71-gpt.qmd
        - chapters/72-paradigm-shift.qmd
        - chapters/73-context-engineering.qmd
        - chapters/74-workflow.qmd
        - chapters/75-code-review.qmd
        - chapters/76-ai-tools.qmd
        - chapters/77-developer-future.qmd

    - part: "**2부** 통합 개발 환경"
      chapters:
        - chapters/ide.qmd
        - chapters/ide_positron.qmd
        - chapters/ide_zed.qmd
        - chapters/ide_extension.qmd
        - chapters/ide_setup.qmd
        - chapters/docker_concept.qmd
        - chapters/compendium.qmd

    - part: "**부록**"
      chapters:
        - chapters/glossary.qmd

    - chapters/references.qmd

# ---------------------------------- #
format:
  html:
    lightbox:
      match: auto
      effect: zoom
    fig-width: 12
    fig-height: 9
    mermaid:
      theme: neutral
    theme:
      light: [cosmo, assets/r2bit.scss]
    number-depth: 3
    number-sections: true
    colorlinks: true
    code-overflow: wrap
    code-link: true
    author-meta: "이광춘(Openai)"
    callout-appearance: simple
    tbl-cap-location: bottom

# ---------------------------------- #
filters:
  - fontawesome
  - include-code-files
  - fancy-text

code-annotations: hover

bibliography: assets/references.bib
csl: https://www.zotero.org/styles/ieee
link-citations: true
cite-method: citeproc

# ---------------------------------- #
glossary:
  path: glossary.yml
  popup: click
  show: true

# ---------------------------------- #
engine: knitr
jupyter: python3

knitr:
  opts_chunk:
    message: false
    warning: false
    collapse: true
    code-overflow: code-overflow
    fig-crop: false
    comment: "#>"
    R.options:
      knitr.graphics.auto_pdf: true
editor_options:
  chunk_output_type: console

editor:
  markdown:
    wrap: 72
