<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Palatino, 'Book Antiqua', Georgia, serif">
  <!-- Marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">메타프로그래밍과 AI 코딩의 교차점</text>
  <!-- Subtitle -->
  <text x="400" y="50" text-anchor="middle" font-size="13" font-style="italic" fill="#666666">전통 메타프로그래밍의 패턴이 AI 코딩에서 반복된다</text>

  <!-- ============================================ -->
  <!-- ROW 1: 컨텍스트 파일 = 메타프로그램            -->
  <!-- ============================================ -->

  <!-- Row 1 dashed grouping box -->
  <rect x="20" y="68" width="760" height="126" rx="3" fill="none" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Row label -->
  <text x="400" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">컨텍스트 파일 = 메타프로그램</text>

  <!-- Row 1 — Traditional lane -->
  <text x="40" y="112" font-size="11" font-style="italic" fill="#666666">전통</text>

  <rect x="80" y="96" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="155" y="116" text-anchor="middle" font-size="12" fill="#333333">컴파일러 플래그 -Wall</text>

  <line x1="230" y1="112" x2="288" y2="112" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="290" y="96" width="120" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="350" y="116" text-anchor="middle" font-size="12" fill="#333333">컴파일러</text>

  <line x1="410" y1="112" x2="468" y2="112" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="470" y="96" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="545" y="116" text-anchor="middle" font-size="12" fill="#333333">경고 포함 코드</text>

  <!-- Equivalence symbol -->
  <text x="680" y="143" text-anchor="middle" font-size="20" fill="#999999">≈</text>

  <!-- Row 1 — AI lane -->
  <text x="40" y="160" font-size="11" font-style="italic" fill="#666666">AI</text>

  <rect x="80" y="144" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="155" y="164" text-anchor="middle" font-size="12" fill="#333333">CLAUDE.md 규칙</text>

  <line x1="230" y1="160" x2="288" y2="160" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="290" y="144" width="120" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="350" y="164" text-anchor="middle" font-size="12" fill="#333333">AI 에이전트</text>

  <line x1="410" y1="160" x2="468" y2="160" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="470" y="144" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="545" y="164" text-anchor="middle" font-size="12" fill="#333333">규칙 준수 코드</text>

  <!-- ============================================ -->
  <!-- ROW 2: 테스트 = 실행 가능한 명세              -->
  <!-- ============================================ -->

  <!-- Row 2 dashed grouping box -->
  <rect x="20" y="210" width="760" height="126" rx="3" fill="none" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Row label -->
  <text x="400" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">테스트 = 실행 가능한 명세</text>

  <!-- Row 2 — Traditional lane -->
  <text x="40" y="254" font-size="11" font-style="italic" fill="#666666">전통</text>

  <rect x="80" y="238" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="155" y="258" text-anchor="middle" font-size="12" fill="#333333">BNF 문법 명세</text>

  <line x1="230" y1="254" x2="288" y2="254" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="290" y="238" width="120" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="350" y="258" text-anchor="middle" font-size="12" fill="#333333">yacc</text>

  <line x1="410" y1="254" x2="468" y2="254" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="470" y="238" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="545" y="258" text-anchor="middle" font-size="12" fill="#333333">파서 코드</text>

  <!-- Equivalence symbol -->
  <text x="680" y="285" text-anchor="middle" font-size="20" fill="#999999">≈</text>

  <!-- Row 2 — AI lane -->
  <text x="40" y="302" font-size="11" font-style="italic" fill="#666666">AI</text>

  <rect x="80" y="286" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="155" y="306" text-anchor="middle" font-size="12" fill="#333333">테스트 코드</text>

  <line x1="230" y1="302" x2="288" y2="302" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="290" y="286" width="120" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="350" y="306" text-anchor="middle" font-size="12" fill="#333333">AI</text>

  <line x1="410" y1="302" x2="468" y2="302" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="470" y="286" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="545" y="306" text-anchor="middle" font-size="12" fill="#333333">구현 코드</text>

  <!-- ============================================ -->
  <!-- ROW 3: 프롬프트 = DSL 설계                   -->
  <!-- ============================================ -->

  <!-- Row 3 dashed grouping box -->
  <rect x="20" y="352" width="760" height="126" rx="3" fill="none" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Row label -->
  <text x="400" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">프롬프트 = DSL 설계</text>

  <!-- Row 3 — Traditional lane -->
  <text x="40" y="396" font-size="11" font-style="italic" fill="#666666">전통</text>

  <rect x="80" y="380" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="155" y="400" text-anchor="middle" font-size="12" fill="#333333">y ~ x 공식</text>

  <line x1="230" y1="396" x2="288" y2="396" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="290" y="380" width="120" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="350" y="400" text-anchor="middle" font-size="12" fill="#333333">lm()</text>

  <line x1="410" y1="396" x2="468" y2="396" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="470" y="380" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="545" y="400" text-anchor="middle" font-size="12" fill="#333333">회귀 모델</text>

  <!-- Equivalence symbol -->
  <text x="680" y="427" text-anchor="middle" font-size="20" fill="#999999">≈</text>

  <!-- Row 3 — AI lane -->
  <text x="40" y="444" font-size="11" font-style="italic" fill="#666666">AI</text>

  <rect x="80" y="428" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="155" y="448" text-anchor="middle" font-size="12" fill="#333333">구조화된 프롬프트</text>

  <line x1="230" y1="444" x2="288" y2="444" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="290" y="428" width="120" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="350" y="448" text-anchor="middle" font-size="12" fill="#333333">LLM</text>

  <line x1="410" y1="444" x2="468" y2="444" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="470" y="428" width="150" height="32" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="545" y="448" text-anchor="middle" font-size="12" fill="#333333">맞춤 코드</text>

  <!-- ============================================ -->
  <!-- Column headers (input / processor / output)  -->
  <!-- ============================================ -->
  <text x="155" y="504" text-anchor="middle" font-size="11" fill="#999999">입력 (명세/규칙)</text>
  <text x="350" y="504" text-anchor="middle" font-size="11" fill="#999999">변환기 (메타/AI)</text>
  <text x="545" y="504" text-anchor="middle" font-size="11" fill="#999999">출력 (생성된 코드)</text>
</svg>