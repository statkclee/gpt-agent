<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 55 800 380">
  <defs>
    <style>
      .tufte-title { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 20px; fill: #111; font-weight: bold; }
      .tufte-subtitle { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 14px; fill: #555; }
      .tufte-header { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 15px; fill: #111; font-weight: bold; }
      .tufte-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 13px; fill: #222; font-weight: bold; }
      .tufte-text { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 12px; fill: #333; }
      .tufte-desc { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #666; font-style: italic; }
      .tufte-small { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 10px; fill: #777; }
      .tufte-box { fill: #fdfdfd; stroke: #999; stroke-width: 1; }
      .tufte-box-highlight { fill: #f9f9f9; stroke: #444; stroke-width: 1.5; }
      .tufte-line { stroke: #888; stroke-width: 1; }
      .tufte-arrow { fill: #888; }
      
      .level-bar { fill: #e0e0e0; stroke: none; }
      .level-bar-active { fill: #333; stroke: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="tufte-arrow"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="480" fill="#ffffff"/>

  <!-- Title -->
  <!-- <text x="400" y="35" text-anchor="middle" class="tufte-title">추상화 계층의 상승</text>
  <text x="400" y="60" text-anchor="middle" class="tufte-subtitle">"어떻게(How)"에서 "무엇을(What)"로의 이동</text> -->

  <!-- Left: The Stack (Abstraction Layers) -->
  <g transform="translate(60, 90)">
    <!-- Axis Label -->
    <text x="-30" y="150" transform="rotate(-90, -30, 150)" text-anchor="middle" class="tufte-label" fill="#666">추상화 수준</text>
    <line x1="-10" y1="300" x2="-10" y2="0" class="tufte-line" marker-end="url(#arrowhead)"/>

    <!-- Layer 1: Machine Code (Bottom) -->
    <g transform="translate(20, 240)">
      <rect x="0" y="0" width="280" height="60" class="tufte-box" rx="3"/>
      <text x="140" y="25" text-anchor="middle" class="tufte-label">기계어 / 어셈블리</text>
      <text x="140" y="45" text-anchor="middle" class="tufte-small" font-family="monospace">MOV AX, 5 | ADD AX, 3</text>
    </g>

    <!-- Layer 2: High-Level Languages -->
    <g transform="translate(20, 160)">
      <rect x="0" y="0" width="280" height="60" class="tufte-box" rx="3"/>
      <text x="140" y="25" text-anchor="middle" class="tufte-label">고급 언어 (C, Python)</text>
      <text x="140" y="45" text-anchor="middle" class="tufte-small" font-family="monospace">x = 5 + 3 | for i in list</text>
    </g>

    <!-- Layer 3: Frameworks -->
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="280" height="60" class="tufte-box" rx="3"/>
      <text x="140" y="25" text-anchor="middle" class="tufte-label">프레임워크 (React, Spring)</text>
      <text x="140" y="45" text-anchor="middle" class="tufte-small" font-family="monospace">useState() | @Controller</text>
    </g>

    <!-- Layer 4: Vibe Coding (Top) -->
    <g transform="translate(20, 0)">
      <rect x="0" y="0" width="280" height="60" class="tufte-box-highlight" rx="3"/>
      <text x="140" y="25" text-anchor="middle" class="tufte-label" fill="#111">바이브 코딩 (자연어)</text>
      <text x="140" y="45" text-anchor="middle" class="tufte-small" font-family="monospace" fill="#333">"이런 느낌으로 만들어줘..."</text>
    </g>
  </g>

  <!-- Connection Lines (Connecting Layers to Roles) -->
  <g transform="translate(360, 90)" stroke="#ddd" stroke-dasharray="3 3">
    <line x1="0" y1="270" x2="60" y2="270"/>
    <line x1="0" y1="190" x2="60" y2="190"/>
    <line x1="0" y1="110" x2="60" y2="110"/>
    <line x1="0" y1="30" x2="60" y2="30"/>
  </g>

  <!-- Right: Developer Role Evolution -->
  <g transform="translate(420, 90)">
    <!-- <text x="150" y="-10" text-anchor="middle" class="tufte-header">개발자 초점</text> -->

    <!-- Role 1 -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="300" height="60" fill="none"/>
      <text x="0" y="25" class="tufte-text" font-weight="bold">하드웨어 제어자</text>
      <text x="0" y="45" class="tufte-desc">레지스터와 메모리 직접 관리</text>
    </g>

    <!-- Role 2 -->
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="300" height="60" fill="none"/>
      <text x="0" y="25" class="tufte-text" font-weight="bold">로직 설계자</text>
      <text x="0" y="45" class="tufte-desc">알고리즘과 자료구조 설계</text>
    </g>

    <!-- Role 3 -->
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="300" height="60" fill="none"/>
      <text x="0" y="25" class="tufte-text" font-weight="bold">비즈니스 개발자</text>
      <text x="0" y="45" class="tufte-desc">컴포넌트 조합으로 문제 해결</text>
    </g>

    <!-- Role 4 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="300" height="60" fill="none"/>
      <text x="0" y="25" class="tufte-text" font-weight="bold" fill="#111">오케스트레이터 &amp; 검증자</text>
      <text x="0" y="45" class="tufte-desc" fill="#333">의도 명세, 결과 검증, AI 도구 조율</text>
    </g>
  </g>

  <!-- Bottom Insight Box -->
  <g transform="translate(80, 400)">
    <!-- <rect x="0" y="0" width="640" height="50" class="tufte-box" rx="4" fill="#fdfdfd"/> -->
    <text x="320" y="20" text-anchor="middle" class="tufte-label">
    "추상화가 높아질수록 직접 구현은 특수 기술이 되고, 조율과 검증이 핵심 역량이 된다."
    </text>
    <!-- <text x="320" y="38" text-anchor="middle" class="tufte-small" font-style="italic">
      "추상화가 높아질수록 직접 구현은 특수 기술이 되고, 조율과 검증이 핵심 역량이 된다."
    </text> -->
  </g>

</svg>