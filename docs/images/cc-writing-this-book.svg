<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <rect width="900" height="440" fill="#fafafa" rx="4"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">실전: 이 책이 만들어지는 과정</text>
  <line x1="120" y1="50" x2="780" y2="50" stroke="#999" stroke-width="0.5"/>

  <defs>
    <marker id="ar4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="40" y="70" width="180" height="130" rx="5" fill="none" stroke="#555" stroke-width="1.2"/>
  <rect x="40" y="70" width="180" height="28" rx="5" fill="#444"/>
  <text x="130" y="89" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">1. 저자 지시</text>
  <text x="55" y="115" font-size="11" fill="#555">"문서 복잡성에 대해</text>
  <text x="55" y="132" font-size="11" fill="#555"> 도입부 챕터로</text>
  <text x="55" y="149" font-size="11" fill="#555"> 기술해"</text>
  <text x="55" y="180" font-size="10" fill="#999" font-style="italic">자연어 한 문장</text>

  <line x1="220" y1="135" x2="260" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#ar4)"/>

  <!-- Step 2 -->
  <rect x="262" y="70" width="180" height="130" rx="5" fill="none" stroke="#555" stroke-width="1.2"/>
  <rect x="262" y="70" width="180" height="28" rx="5" fill="#555"/>
  <text x="352" y="89" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">2. 조사 + 기술문서</text>
  <text x="277" y="115" font-size="11" fill="#555">/research 실행</text>
  <text x="277" y="132" font-size="11" fill="#555">WebSearch 7회</text>
  <text x="277" y="149" font-size="11" fill="#555">tech_document/ 저장</text>
  <text x="277" y="180" font-size="10" fill="#999" font-style="italic">근거 확보 + 구조화</text>

  <line x1="442" y1="135" x2="482" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#ar4)"/>

  <!-- Step 3 -->
  <rect x="484" y="70" width="180" height="130" rx="5" fill="none" stroke="#555" stroke-width="1.2"/>
  <rect x="484" y="70" width="180" height="28" rx="5" fill="#666"/>
  <text x="574" y="89" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">3. SVG + 집필</text>
  <text x="499" y="115" font-size="11" fill="#555">SVG 5개 제작</text>
  <text x="499" y="132" font-size="11" fill="#555">.qmd 본문 작성</text>
  <text x="499" y="149" font-size="11" fill="#555">_quarto.yml 등록</text>
  <text x="499" y="180" font-size="10" fill="#999" font-style="italic">구조 + 시각 + 본문</text>

  <line x1="664" y1="135" x2="704" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#ar4)"/>

  <!-- Step 4 -->
  <rect x="706" y="70" width="155" height="130" rx="5" fill="none" stroke="#555" stroke-width="1.2"/>
  <rect x="706" y="70" width="155" height="28" rx="5" fill="#777"/>
  <text x="783" y="89" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">4. 빌드 + 검증</text>
  <text x="721" y="115" font-size="11" fill="#555">quarto render</text>
  <text x="721" y="132" font-size="11" fill="#555">U+FFFD 검사</text>
  <text x="721" y="149" font-size="11" fill="#555">인용 확인</text>
  <text x="721" y="180" font-size="10" fill="#999" font-style="italic">무결성 보장</text>

  <!-- What Claude Code does vs Author does -->
  <text x="450" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">역할 분담: 저자 vs Claude Code</text>

  <!-- Author column -->
  <rect x="40" y="245" width="400" height="160" rx="5" fill="none" stroke="#555" stroke-width="1.2"/>
  <rect x="40" y="245" width="400" height="28" rx="5" fill="#444"/>
  <text x="240" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">저자가 하는 것</text>
  <text x="60" y="292" font-size="12" fill="#555">- 무엇을 쓸지 결정 (주제, 독자, 목적)</text>
  <text x="60" y="314" font-size="12" fill="#555">- 구조와 흐름 판단 (목차 배치, 논리 순서)</text>
  <text x="60" y="336" font-size="12" fill="#555">- 사실 검증과 최종 승인</text>
  <text x="60" y="358" font-size="12" fill="#555">- 품질 기준 설정 (CLAUDE.md에 문체 규칙 정의)</text>
  <text x="60" y="386" font-size="11" fill="#888" font-style="italic">핵심: 판단, 검증, 의사결정</text>

  <!-- CC column -->
  <rect x="460" y="245" width="400" height="160" rx="5" fill="none" stroke="#555" stroke-width="1.2"/>
  <rect x="460" y="245" width="400" height="28" rx="5" fill="#555"/>
  <text x="660" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Claude Code가 하는 것</text>
  <text x="480" y="292" font-size="12" fill="#555">- 자료 조사 (WebSearch, 코드베이스 탐색)</text>
  <text x="480" y="314" font-size="12" fill="#555">- 초안 생성 (본문, SVG, 표)</text>
  <text x="480" y="336" font-size="12" fill="#555">- 반복 작업 (렌더링, 문체 검사, 용어 통일)</text>
  <text x="480" y="358" font-size="12" fill="#555">- 무결성 검사 (깨진 문자, 인용, 링크)</text>
  <text x="480" y="386" font-size="11" fill="#888" font-style="italic">핵심: 생성, 실행, 반복, 검사</text>

  <!-- Bottom -->
  <rect x="140" y="414" width="620" height="20" rx="3" fill="#f0f0f0"/>
  <text x="450" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">저자는 지시하고 검증한다. Claude Code는 생성하고 실행한다. 둘 다 없으면 책이 안 된다.</text>
</svg>