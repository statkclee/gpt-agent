<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Palatino, 'Book Antiqua', Georgia, serif">

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">Python 메타프로그래밍 4층 구조</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">위로 갈수록 쉽고, 아래로 갈수록 강력하다</text>

  <!-- Layer area: y=70 to y=330, each layer height=65 -->

  <!-- Layer 1 (top, lightest) -->
  <rect x="100" y="70" width="600" height="65" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="120" y="97" font-size="14" font-weight="bold" fill="#333333">1층 데코레이터</text>
  <text x="120" y="117" font-size="11" fill="#666666">@property, @dataclass, @staticmethod</text>
  <text x="660" y="108" text-anchor="end" font-size="12" fill="#333333">접근성: ★★★★★</text>

  <!-- Layer 2 -->
  <rect x="100" y="135" width="600" height="65" fill="#EEEEEE" stroke="#999999" stroke-width="1"/>
  <text x="120" y="162" font-size="14" font-weight="bold" fill="#333333">2층 디스크립터</text>
  <text x="120" y="182" font-size="11" fill="#666666">__get__, __set__, ORM, Django</text>
  <text x="660" y="173" text-anchor="end" font-size="12" fill="#333333">접근성: ★★★☆☆</text>

  <!-- Layer 3 -->
  <rect x="100" y="200" width="600" height="65" fill="#E0E0E0" stroke="#999999" stroke-width="1"/>
  <text x="120" y="227" font-size="14" font-weight="bold" fill="#333333">3층 메타클래스</text>
  <text x="120" y="247" font-size="11" fill="#666666">type(), __new__, Django ModelBase</text>
  <text x="660" y="238" text-anchor="end" font-size="12" fill="#333333">접근성: ★★☆☆☆</text>

  <!-- Layer 4 (bottom, darkest) -->
  <rect x="100" y="265" width="600" height="65" fill="#D5D5D5" stroke="#999999" stroke-width="1"/>
  <text x="120" y="292" font-size="14" font-weight="bold" fill="#333333">4층 AST 조작</text>
  <text x="120" y="312" font-size="11" fill="#666666">ast.parse(), 구문 트리 변환, pytest assert</text>
  <text x="660" y="303" text-anchor="end" font-size="12" fill="#333333">접근성: ★☆☆☆☆</text>

  <!-- Left arrow: 복잡도 ↑ -->
  <line x1="60" y1="80" x2="60" y2="320" stroke="#333333" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="55" y="205" text-anchor="middle" font-size="12" fill="#333333" transform="rotate(-90, 55, 205)">복잡도 ↑</text>

  <!-- Right arrow: 제어력 ↑ -->
  <line x1="740" y1="80" x2="740" y2="320" stroke="#333333" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="745" y="205" text-anchor="middle" font-size="12" fill="#333333" transform="rotate(90, 745, 205)">제어력 ↑</text>

  <!-- Bottom annotation -->
  <text x="400" y="365" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">데코레이터로 충분하면 메타클래스를 쓰지 않는다 — Tim Peters</text>

</svg>