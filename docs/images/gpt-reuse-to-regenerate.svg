<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 60 800 420">
  <defs>
    <style>
      .tufte-title { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 22px; fill: #111; font-weight: bold; }
      .tufte-subtitle { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 15px; fill: #555; }
      .tufte-header { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 16px; fill: #111; font-weight: bold; }
      .tufte-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 14px; fill: #222; font-weight: bold; }
      .tufte-text { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 13px; fill: #333; }
      .tufte-desc { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 12px; fill: #555; font-style: italic; }
      .tufte-small { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #666; }
      .tufte-box { fill: #fdfdfd; stroke: #999; stroke-width: 1; }
      .tufte-box-highlight { fill: #f4f4f4; stroke: #444; stroke-width: 1.5; }
      .tufte-line { stroke: #888; stroke-width: 1; }
      .tufte-arrow { fill: #888; }
      .icon { fill: none; stroke: #555; stroke-width: 1.5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="tufte-arrow"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#ffffff"/>

  <!-- Title -->
  <!-- <text x="400" y="40" text-anchor="middle" class="tufte-title">재사용에서 재생성으로</text>
  <text x="400" y="65" text-anchor="middle" class="tufte-subtitle">코드 생산 비용의 붕괴가 가져온 소프트웨어 공학의 대전환</text> -->

  <!-- Main Comparison Area -->
  <g transform="translate(0, 90)">

    <!-- Left: The Era of Scarcity -->
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="300" height="220" class="tufte-box" rx="4"/>

      <text x="150" y="30" text-anchor="middle" class="tufte-header">결핍의 시대</text>
      <text x="150" y="50" text-anchor="middle" class="tufte-small" fill="#888">전통적 개발</text>

      <!-- Cost Equation -->
      <text x="150" y="85" text-anchor="middle" class="tufte-label">코드 비용 = 높음 ($$$)</text>

      <!-- Visual: Stacking Bricks (Reuse) -->
      <g transform="translate(110, 100)">
        <rect x="0" y="20" width="30" height="15" fill="#ddd" stroke="#999"/>
        <rect x="35" y="20" width="30" height="15" fill="#ddd" stroke="#999"/>
        <rect x="17" y="5" width="30" height="15" fill="#bbb" stroke="#777"/>
        <text x="85" y="25" class="tufte-small">모듈 &amp; 라이브러리</text>
      </g>

      <!-- Imperative -->
      <text x="150" y="160" text-anchor="middle" class="tufte-text" font-weight="bold">"반복하지 마라 (DRY)"</text>
      <text x="150" y="180" text-anchor="middle" class="tufte-desc">한 번 작성하고 여러 번 사용</text>
      <text x="150" y="200" text-anchor="middle" class="tufte-small">코드 = 자산(Asset)</text>
    </g>

    <!-- Arrow: The Shift -->
    <g transform="translate(380, 110)">
       <line x1="0" y1="0" x2="40" y2="0" class="tufte-line" marker-end="url(#arrowhead)"/>
       <text x="20" y="-10" text-anchor="middle" class="tufte-small">LLM</text>
    </g>

    <!-- Right: The Era of Abundance -->
    <g transform="translate(440, 0)">
      <rect x="0" y="0" width="300" height="220" class="tufte-box-highlight" rx="4"/>

      <text x="150" y="30" text-anchor="middle" class="tufte-header">풍요의 시대</text>
      <text x="150" y="50" text-anchor="middle" class="tufte-small" fill="#888">AI 협업 개발</text>

      <!-- Cost Equation -->
      <text x="150" y="85" text-anchor="middle" class="tufte-label">코드 비용 ≈ 0</text>

      <!-- Visual: Infinite Stream (Regenerate) -->
      <g transform="translate(110, 100)">
        <path d="M 0 15 Q 15 5 30 15 T 60 15" fill="none" stroke="#444" stroke-width="1.5"/>
        <path d="M 0 25 Q 15 15 30 25 T 60 25" fill="none" stroke="#444" stroke-width="1.5" opacity="0.6"/>
        <text x="75" y="25" class="tufte-small">생성 스트림</text>
      </g>

      <!-- Imperative -->
      <text x="150" y="160" text-anchor="middle" class="tufte-text" font-weight="bold">"생성하고 폐기하라"</text>
      <text x="150" y="180" text-anchor="middle" class="tufte-desc">필요할 때 생성하고 언제든 교체</text>
      <text x="150" y="200" text-anchor="middle" class="tufte-small">코드 = 부채(Liability)</text>
    </g>
  </g>

  <!-- Bottom Comparison Table -->
  <g transform="translate(60, 340)">
    <!-- <text x="0" y="-15" class="tufte-label" fill="#444">지식의 가치 이동</text> -->
    <line x1="0" y1="0" x2="680" y2="0" class="tufte-line" stroke-width="2"/>

    <!-- Headers -->
    <text x="50" y="30" class="tufte-label">구분</text>
    <text x="250" y="30" class="tufte-label" fill="#666">과거 (인간 단독)</text>
    <text x="500" y="30" class="tufte-label" fill="#111">현재 (AI 협업)</text>

    <!-- Row 1: Design Patterns -->
    <line x1="0" y1="45" x2="680" y2="45" class="tufte-line" stroke-dasharray="2 2" opacity="0.5"/>
    <text x="50" y="70" class="tufte-text" font-weight="bold">디자인 패턴 지식</text>
    <text x="250" y="70" class="tufte-text" fill="#666">구현을 위한 설계도</text>
    <text x="500" y="70" class="tufte-text">AI와 소통하는 어휘 ✨</text>

    <!-- Row 2: Architecture -->
    <line x1="0" y1="90" x2="680" y2="90" class="tufte-line" stroke-dasharray="2 2" opacity="0.5"/>
    <text x="50" y="115" class="tufte-text" font-weight="bold">개발자 역할</text>
    <text x="250" y="115" class="tufte-text" fill="#666">코드 작성자</text>
    <text x="500" y="115" class="tufte-text">맥락 설계자 + 검증자 ✨</text>
  </g>

  <!-- Bottom Insight -->
  <!-- <text x="400" y="485" text-anchor="middle" class="tufte-small" font-style="italic" fill="#666">
    "코드 생성이 쉬워질수록, 무엇을 만들지에 대한 맥락 설계와 결과 검증이 더 중요해진다."
  </text> -->
</svg>