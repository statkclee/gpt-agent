<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 55 800 350">
  <defs>
    <style>
      .tufte-title { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 20px; fill: #111; font-weight: bold; }
      .tufte-subtitle { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 14px; fill: #555; }
      .tufte-header { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 15px; fill: #111; font-weight: bold; }
      .tufte-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 13px; fill: #222; font-weight: bold; }
      .tufte-text { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 12px; fill: #333; }
      .tufte-small { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #666; }
      .tufte-box { fill: #fdfdfd; stroke: #999; stroke-width: 1; }
      .tufte-box-highlight { fill: #f9f9f9; stroke: #444; stroke-width: 1.5; }
      .tufte-line { stroke: #888; stroke-width: 1; }
      
      /* Column Highlight */
      .col-human { fill: #f4f4f4; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="450" fill="#ffffff"/>

  <!-- Title -->
  <!-- <text x="400" y="35" text-anchor="middle" class="tufte-title">Human-AI 협업 모델: 역할의 재정의</text>
  <text x="400" y="58" text-anchor="middle" class="tufte-subtitle">실행자(코더)에서 지휘자(오케스트레이터)로</text> -->

  <!-- Top Visual: The Shift -->
  <g transform="translate(120, 90)">

    <!-- Left: Past -->
    <g transform="translate(0, 0)">
      <text x="80" y="-10" text-anchor="middle" class="tufte-small">과거 패러다임</text>
      <rect x="0" y="0" width="160" height="60" class="tufte-box" rx="3"/>
      <text x="80" y="25" text-anchor="middle" class="tufte-label">단독 코더</text>
      <text x="80" y="45" text-anchor="middle" class="tufte-small">사고 + 타이핑</text>
    </g>

    <!-- Arrow -->
    <line x1="170" y1="30" x2="210" y2="30" class="tufte-line" marker-end="url(#arrowhead)"/>

    <!-- Right: Future -->
    <g transform="translate(220, 0)">
      <text x="170" y="-10" text-anchor="middle" class="tufte-small">새로운 패러다임</text>
      <rect x="0" y="0" width="340" height="60" class="tufte-box-highlight" rx="3"/>

      <!-- Split -->
      <line x1="170" y1="0" x2="170" y2="60" class="tufte-line" stroke-dasharray="2 2" stroke="#ccc"/>

      <!-- AI Side -->
      <text x="85" y="25" text-anchor="middle" class="tufte-label" fill="#555">AI (생성자)</text>
      <text x="85" y="45" text-anchor="middle" class="tufte-small">빠른 실행 (손)</text>

      <!-- Human Side -->
      <text x="255" y="25" text-anchor="middle" class="tufte-label" fill="#111">Human (검증자)</text>
      <text x="255" y="45" text-anchor="middle" class="tufte-small">비판적 판단 (머리)</text>
    </g>
  </g>

  <!-- Responsibility Matrix Table -->
  <g transform="translate(80, 190)">

    <!-- Header Row -->
    <text x="0" y="0" class="tufte-header">작업 영역</text>
    <text x="200" y="0" class="tufte-header" fill="#555">AI 담당</text>
    <text x="440" y="0" class="tufte-header" fill="#111">Human 담당</text>
    <line x1="0" y1="10" x2="640" y2="10" class="tufte-line" stroke-width="1.5"/>

    <!-- Row 1: Code Gen -->
    <g transform="translate(0, 30)">
      <text x="0" y="10" class="tufte-label">1. 구현</text>
      <text x="200" y="10" class="tufte-text">보일러플레이트, 단위 테스트, 함수</text>
      <text x="440" y="10" class="tufte-text" font-weight="bold">시스템 아키텍처 &amp; API</text>
      <line x1="0" y1="25" x2="640" y2="25" class="tufte-line" stroke-width="0.5" stroke="#ddd"/>
    </g>

    <!-- Row 2: Patterns -->
    <g transform="translate(0, 70)">
      <text x="0" y="10" class="tufte-label">2. 디자인 패턴</text>
      <text x="200" y="10" class="tufte-text">특정 패턴 구현</text>
      <text x="440" y="10" class="tufte-text" font-weight="bold">적합한 패턴 선택</text>
      <line x1="0" y1="25" x2="640" y2="25" class="tufte-line" stroke-width="0.5" stroke="#ddd"/>
    </g>

    <!-- Row 3: Quality -->
    <g transform="translate(0, 110)">
      <text x="0" y="10" class="tufte-label">3. 품질 &amp; 보안</text>
      <text x="200" y="10" class="tufte-text">문법 검사, 기본 린팅</text>
      <text x="440" y="10" class="tufte-text" font-weight="bold">보안 감사 &amp; 로직 검증</text>
      <line x1="0" y1="25" x2="640" y2="25" class="tufte-line" stroke-width="0.5" stroke="#ddd"/>
    </g>

    <!-- Row 4: Debugging -->
    <g transform="translate(0, 150)">
      <text x="0" y="10" class="tufte-label">4. 문제 해결</text>
      <text x="200" y="10" class="tufte-text">오류 분석 &amp; 수정 제안</text>
      <text x="440" y="10" class="tufte-text" font-weight="bold">근본 원인 분석 (Why?)</text>
      <line x1="0" y1="25" x2="640" y2="25" class="tufte-line" stroke-width="0.5" stroke="#ddd"/>
    </g>
  </g>

  <!-- Bottom Insight -->
  <g transform="translate(80, 370)">
    <rect x="0" y="0" width="640" height="30" fill="none" stroke="none"/>
    <text x="320" y="20" text-anchor="middle" class="tufte-small" font-style="italic">
      "AI는 속도(실행)를 제공하고, 인간은 안전(검증)을 제공한다. 검증 없는 속도는 위험하다."
    </text>
  </g>

</svg>