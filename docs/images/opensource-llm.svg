<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520">
  <defs>
    <style>
      .tufte-title { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 20px; fill: #222; font-weight: bold; }
      .tufte-subtitle { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 14px; fill: #666; }
      .tufte-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 14px; fill: #333; font-weight: bold; }
      .tufte-text { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 12px; fill: #444; }
      .tufte-small { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #666; }
      .tufte-box { fill: #f9f9f9; stroke: #999; stroke-width: 1; }
      .tufte-box-free { fill: #f0f0f0; stroke: #666; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="850" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" class="tufte-title">오픈소스 LLM 생태계</text>
  <text x="425" y="55" text-anchor="middle" class="tufte-subtitle">상용 API vs 오픈소스 자체 호스팅 (2025년)</text>

  <!-- Top Section: Commercial (Paid) -->
  <g transform="translate(80, 90)">
    <text x="325" y="-10" text-anchor="middle" class="tufte-label" fill="#666">상용 API (유료, 관리형)</text>
    
    <rect x="0" y="10" width="650" height="60" class="tufte-box" rx="5"/>
    <text x="20" y="35" class="tufte-text" font-weight="bold">OpenAI / Anthropic / Google</text>
    <text x="20" y="55" class="tufte-small">✓ 즉시 사용 ✓ 관리 불필요 ✓ 최신 모델</text>
    <text x="500" y="35" class="tufte-text" fill="#888">비용: $0.10 ~ $75 / 1M 토큰</text>
  </g>

  <!-- Middle Divider -->
  <line x1="100" y1="200" x2="750" y2="200" stroke="#ccc" stroke-width="2"/>
  <text x="425" y="220" text-anchor="middle" class="tufte-label">오픈소스 LLM (무료, 자체 관리)</text>

  <!-- Bottom Section: Open Source -->
  <g transform="translate(60, 240)">
    
    <!-- Llama -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="220" height="120" class="tufte-box-free" rx="5"/>
      <text x="110" y="25" text-anchor="middle" class="tufte-label">Meta Llama 4</text>
      <line x1="20" y1="35" x2="200" y2="35" stroke="#999" stroke-width="0.5"/>
      <text x="20" y="55" class="tufte-text">Scout 70B (128k)</text>
      <text x="20" y="75" class="tufte-small">GPU: 40GB+ (A100)</text>
      <text x="20" y="95" class="tufte-small">범용, 성능 우수</text>
      <text x="20" y="110" class="tufte-small" fill="#888">Meta Llama 라이선스</text>
    </g>

    <!-- Mixtral -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="220" height="120" class="tufte-box-free" rx="5"/>
      <text x="110" y="25" text-anchor="middle" class="tufte-label">Mixtral</text>
      <line x1="20" y1="35" x2="200" y2="35" stroke="#999" stroke-width="0.5"/>
      <text x="20" y="55" class="tufte-text">Mixtral 8x22B (176B)</text>
      <text x="20" y="75" class="tufte-small">GPU: 80GB (4bit)</text>
      <text x="20" y="95" class="tufte-small">MoE, 유럽 기반</text>
      <text x="20" y="110" class="tufte-small" fill="#888">Apache 2.0</text>
    </g>

    <!-- Qwen -->
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="220" height="120" class="tufte-box-free" rx="5"/>
      <text x="110" y="25" text-anchor="middle" class="tufte-label">Qwen 3</text>
      <line x1="20" y1="35" x2="200" y2="35" stroke="#999" stroke-width="0.5"/>
      <text x="20" y="55" class="tufte-text">Qwen 3 32B Coder</text>
      <text x="20" y="75" class="tufte-small">GPU: 24GB (4090)</text>
      <text x="20" y="95" class="tufte-small">코딩 특화</text>
      <text x="20" y="110" class="tufte-small" fill="#888">Apache 2.0</text>
    </g>

    <!-- DeepSeek -->
    <g transform="translate(130, 140)">
      <rect x="0" y="0" width="220" height="120" class="tufte-box-free" rx="5"/>
      <text x="110" y="25" text-anchor="middle" class="tufte-label">DeepSeek-V3</text>
      <line x1="20" y1="35" x2="200" y2="35" stroke="#999" stroke-width="0.5"/>
      <text x="20" y="55" class="tufte-text">DeepSeek-V3 671B</text>
      <text x="20" y="75" class="tufte-small">GPU: 700GB (FP8)</text>
      <text x="20" y="95" class="tufte-small">초대형, 추론 특화</text>
      <text x="20" y="110" class="tufte-small" fill="#888">MIT</text>
    </g>

    <!-- Ollama -->
    <g transform="translate(390, 140)">
      <rect x="0" y="0" width="220" height="120" class="tufte-box-free" rx="5"/>
      <text x="110" y="25" text-anchor="middle" class="tufte-label">Ollama (런타임)</text>
      <line x1="20" y1="35" x2="200" y2="35" stroke="#999" stroke-width="0.5"/>
      <text x="20" y="55" class="tufte-text">로컬 실행 플랫폼</text>
      <text x="20" y="75" class="tufte-small">라이선스: MIT</text>
      <text x="20" y="95" class="tufte-small">특징: 설치 간편</text>
      <text x="20" y="110" class="tufte-small" fill="#888">비용: 로컬 GPU만</text>
    </g>
  </g>

  <!-- Bottom Insight -->
  <text x="425" y="495" text-anchor="middle" class="tufte-small" font-style="italic" fill="#666">
    "오픈소스 LLM은 모델 자체는 무료지만, GPU 운영 비용과 관리 노력이 필요하다."
  </text>

</svg>
