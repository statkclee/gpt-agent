  <!-- ═══ Bottom insight ═══ -->
  <line x1="50" y1="375" x2="630" y2="375" stroke="#003876" stroke-width="0.5" opacity="0.15"/>

  <line x1="55" y1="398" x2="60" y2="398" stroke="#003876" stroke-width="2.5"/>
  <text x="70" y="402" font-size="12" fill="#444">같은 "문서"라도 지배 차원이 다르면 필요한 도구가 완전히 다르다</text>

  <line x1="55" y1="422" x2="60" y2="422" stroke="#003876" stroke-width="2.5"/>
  <text x="70" y="426" font-size="12" fill="#444">"어떤 차원이 이 문서를 지배하는가?" — 이 질문이 도구 선택의 시작점</text>

  <!-- ═══ Margin notes ═══ -->
  <text x="710" y="55" font-size="10" fill="#888" font-style="italic">핵심 4차원은</text>
  <text x="710" y="70" font-size="10" fill="#888" font-style="italic">모든 문서에 공통.</text>
  <text x="710" y="88" font-size="10" fill="#888" font-style="italic">추가 차원은</text>
  <text x="710" y="103" font-size="10" fill="#888" font-style="italic">문서 유형에 따라</text>
  <text x="710" y="118" font-size="10" fill="#888" font-style="italic">선택적으로 적용.</text>

  <text x="710" y="175" font-size="10" fill="#888" font-style="italic">전자세금계산서:</text>
  <text x="710" y="192" font-size="10" fill="#888" font-style="italic">"규제" 차원이 지배.</text>
  <text x="710" y="210" font-size="10" fill="#888" font-style="italic">자동화는 낮아도</text>
  <text x="710" y="225" font-size="10" fill="#888" font-style="italic">규제 때문에</text>
  <text x="710" y="240" font-size="10" fill="#888" font-style="italic">단순 도구로는 불가.</text>

  <text x="710" y="305" font-size="10" fill="#888" font-style="italic">S1000D:</text>
  <text x="710" y="322" font-size="10" fill="#888" font-style="italic">모든 차원이 높음</text>
  <text x="710" y="337" font-size="10" fill="#888" font-style="italic">= 가장 복잡한 문서.</text>
  <text x="710" y="355" font-size="10" fill="#888" font-style="italic">미 해군 48%↓는</text>
  <text x="710" y="370" font-size="10" fill="#888" font-style="italic">이 복잡도를</text>
  <text x="710" y="385" font-size="10" fill="#888" font-style="italic">구조화한 결과.</text>

  <line x1="50" y1="443" x2="630" y2="443" stroke="#eee" stroke-width="0.5"/>
