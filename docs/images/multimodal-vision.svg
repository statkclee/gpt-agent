<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <defs>
    <style>
      .tufte-title { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 18px; fill: #222; font-weight: bold; }
      .tufte-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 14px; fill: #333; font-weight: bold; }
      .tufte-text { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 12px; fill: #444; }
      .tufte-small { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #666; }
      .tufte-code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .box { fill: #f9f9f9; stroke: #999; stroke-width: 1; }
      .box-input { fill: #f0f0f0; stroke: #666; stroke-width: 1.5; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="900" height="350" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="tufte-title">Multimodal 코딩: 이미지와 텍스트 통합 처리</text>
  <text x="450" y="50" text-anchor="middle" class="tufte-small">GPT-4 Vision, Claude Opus 4, Gemini 2.5 Pro 지원</text>

  <!-- Input: Text + Image -->
  <g transform="translate(50, 80)">
    <text x="120" y="0" text-anchor="middle" class="tufte-label">입력 (Multimodal)</text>

    <!-- Text Input -->
    <rect x="0" y="15" width="120" height="80" class="box-input" rx="5"/>
    <text x="60" y="35" text-anchor="middle" class="tufte-text" font-weight="bold">텍스트</text>
    <text x="60" y="55" text-anchor="middle" class="tufte-small">"이 이미지의</text>
    <text x="60" y="70" text-anchor="middle" class="tufte-small">UI 컴포넌트를</text>
    <text x="60" y="85" text-anchor="middle" class="tufte-small">코드로 작성해줘"</text>

    <!-- Image Input -->
    <rect x="130" y="15" width="120" height="80" class="box-input" rx="5"/>
    <text x="190" y="35" text-anchor="middle" class="tufte-text" font-weight="bold">이미지</text>
    <!-- Simple mockup of UI -->
    <rect x="150" y="45" width="80" height="15" fill="none" stroke="#999" rx="2"/>
    <circle cx="160" cy="52" r="3" fill="#ccc"/>
    <text x="170" y="55" class="tufte-small">Login</text>
    <rect x="150" y="65" width="80" height="8" fill="#ddd" rx="1"/>
    <rect x="150" y="77" width="80" height="8" fill="#ddd" rx="1"/>
  </g>

  <!-- Arrow -->
  <path d="M270,120 L320,120" class="arrow"/>

  <!-- LLM Processing -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="240" height="120" class="box" rx="5"/>
    <text x="120" y="25" text-anchor="middle" class="tufte-label">Multimodal LLM</text>

    <!-- Vision Encoder -->
    <rect x="20" y="40" width="90" height="30" fill="#f5f5f5" stroke="#999" rx="3"/>
    <text x="65" y="58" text-anchor="middle" class="tufte-small">Vision Encoder</text>

    <!-- Text Encoder -->
    <rect x="130" y="40" width="90" height="30" fill="#f5f5f5" stroke="#999" rx="3"/>
    <text x="175" y="58" text-anchor="middle" class="tufte-small">Text Encoder</text>

    <!-- Unified Representation -->
    <rect x="20" y="80" width="200" height="25" fill="#e8e8e8" stroke="#666" rx="3"/>
    <text x="120" y="95" text-anchor="middle" class="tufte-small">통합 표현 (벡터)</text>
  </g>

  <!-- Arrow -->
  <path d="M560,120 L610,120" class="arrow"/>

  <!-- Output: Code -->
  <g transform="translate(610, 80)">
    <text x="130" y="0" text-anchor="middle" class="tufte-label">출력 (코드)</text>

    <rect x="0" y="15" width="260" height="105" fill="#fafafa" stroke="#666" rx="5"/>
    <text x="10" y="35" class="tufte-code">&lt;div class="login-form"&gt;</text>
    <text x="15" y="50" class="tufte-code">  &lt;input type="text"</text>
    <text x="15" y="65" class="tufte-code">         placeholder="Username"/&gt;</text>
    <text x="15" y="80" class="tufte-code">  &lt;input type="password"</text>
    <text x="15" y="95" class="tufte-code">         placeholder="Password"/&gt;</text>
    <text x="15" y="110" class="tufte-code">  &lt;button&gt;Login&lt;/button&gt;</text>
  </g>

  <!-- Use Cases -->
  <g transform="translate(50, 250)">
    <text x="0" y="0" class="tufte-label">주요 활용 사례</text>

    <g transform="translate(0, 20)">
      <text x="0" y="0" class="tufte-text">• 디자인 → 코드: UI 스크린샷을 HTML/CSS로 변환</text>
      <text x="0" y="20" class="tufte-text">• 차트 분석: 그래프 이미지에서 데이터 추출 및 분석</text>
      <text x="0" y="40" class="tufte-text">• 다이어그램 → 구현: 아키텍처 다이어그램을 코드로 변환</text>
      <text x="0" y="60" class="tufte-text">• 버그 디버깅: 에러 스크린샷 분석 및 수정 제안</text>
    </g>
  </g>
</svg>
