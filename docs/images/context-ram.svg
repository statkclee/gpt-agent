<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <rect width="900" height="380" fill="#fafafa" rx="4"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">컨텍스트 윈도우 = RAM -- 운영체제 비유</text>
  <line x1="100" y1="50" x2="800" y2="50" stroke="#999" stroke-width="0.5"/>

  <!-- Left: OS -->
  <rect x="40" y="70" width="390" height="260" rx="6" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="235" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#888">운영체제 (OS)</text>

  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="350" height="35" rx="3" fill="#ddd"/>
    <text x="15" y="23" font-size="12" font-weight="bold" fill="#555">RAM</text>
    <text x="180" y="23" font-size="11" fill="#777">현재 실행 중인 프로세스 데이터</text>
  </g>
  <g transform="translate(60, 155)">
    <rect x="0" y="0" width="350" height="35" rx="3" fill="#e8e8e8"/>
    <text x="15" y="23" font-size="12" font-weight="bold" fill="#555">페이징/스왑</text>
    <text x="180" y="23" font-size="11" fill="#777">RAM 부족 시 디스크로 교체</text>
  </g>
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="350" height="35" rx="3" fill="#f0f0f0"/>
    <text x="15" y="23" font-size="12" font-weight="bold" fill="#555">프로세스 격리</text>
    <text x="180" y="23" font-size="11" fill="#777">프로세스 간 메모리 분리</text>
  </g>
  <g transform="translate(60, 245)">
    <rect x="0" y="0" width="350" height="35" rx="3" fill="#f5f5f5"/>
    <text x="15" y="23" font-size="12" font-weight="bold" fill="#555">파일 시스템</text>
    <text x="180" y="23" font-size="11" fill="#777">영구 저장소</text>
  </g>

  <!-- Arrows between -->
  <text x="450" y="150" text-anchor="middle" font-size="20" fill="#555">⟷</text>
  <text x="450" y="195" text-anchor="middle" font-size="20" fill="#555">⟷</text>
  <text x="450" y="240" text-anchor="middle" font-size="20" fill="#555">⟷</text>
  <text x="450" y="285" text-anchor="middle" font-size="20" fill="#555">⟷</text>

  <!-- Right: LLM -->
  <rect x="470" y="70" width="390" height="260" rx="6" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="665" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">LLM 에이전트</text>

  <g transform="translate(490, 110)">
    <rect x="0" y="0" width="350" height="35" rx="3" fill="#555"/>
    <text x="15" y="23" font-size="12" font-weight="bold" fill="#fff">컨텍스트 윈도우</text>
    <text x="200" y="23" font-size="11" fill="#ccc">현재 세션 작업 정보</text>
  </g>
  <g transform="translate(490, 155)">
    <rect x="0" y="0" width="350" height="35" rx="3" fill="#666"/>
    <text x="15" y="23" font-size="12" font-weight="bold" fill="#fff">요약/압축</text>
    <text x="200" y="23" font-size="11" fill="#ddd">auto-compact, 트리밍</text>
  </g>
  <g transform="translate(490, 200)">
    <rect x="0" y="0" width="350" height="35" rx="3" fill="#777"/>
    <text x="15" y="23" font-size="12" font-weight="bold" fill="#fff">에이전트 격리</text>
    <text x="200" y="23" font-size="11" fill="#eee">서브에이전트, Agent Teams</text>
  </g>
  <g transform="translate(490, 245)">
    <rect x="0" y="0" width="350" height="35" rx="3" fill="#888"/>
    <text x="15" y="23" font-size="12" font-weight="bold" fill="#fff">장기 메모리</text>
    <text x="200" y="23" font-size="11" fill="#eee">Auto Memory, CLAUDE.md</text>
  </g>

  <!-- Bottom -->
  <rect x="120" y="345" width="660" height="24" rx="3" fill="#f0f0f0"/>
  <text x="450" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">효과적인 컨텍스트 엔지니어링 = 효과적인 메모리 관리 -- 같은 원리, 다른 매체</text>
</svg>