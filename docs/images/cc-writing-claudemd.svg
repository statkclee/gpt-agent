<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <rect width="900" height="480" fill="#fafafa" rx="4"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">CLAUDE.md -- 저작의 아키텍처</text>
  <line x1="120" y1="50" x2="780" y2="50" stroke="#999" stroke-width="0.5"/>

  <!-- Hierarchy -->
  <text x="450" y="78" text-anchor="middle" font-size="13" fill="#888">CLAUDE.md 계층 구조: 글로벌 > 프로젝트 > 하위 디렉토리</text>

  <!-- Global -->
  <rect x="250" y="95" width="400" height="50" rx="5" fill="#777"/>
  <text x="450" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">~/.claude/CLAUDE.md</text>
  <text x="450" y="135" text-anchor="middle" font-size="11" fill="#ddd">개인 선호: 한국어 응답, 평서문, 간결한 출력</text>

  <!-- Project -->
  <rect x="180" y="160" width="540" height="50" rx="5" fill="#555"/>
  <text x="450" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">gpt-agent/CLAUDE.md</text>
  <text x="450" y="200" text-anchor="middle" font-size="11" fill="#ccc">프로젝트 규칙: Tufte SVG, 문체, 용어, 챕터 구조, 스킬 목록</text>

  <!-- Subdirectory -->
  <rect x="110" y="225" width="310" height="50" rx="5" fill="#444"/>
  <text x="265" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">chapters/CLAUDE.md</text>
  <text x="265" y="265" text-anchor="middle" font-size="11" fill="#ccc">챕터별 규칙: 이미지 경로, 참조 형식</text>

  <rect x="440" y="225" width="350" height="50" rx="5" fill="#444"/>
  <text x="615" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">.claude/commands/*.md</text>
  <text x="615" y="265" text-anchor="middle" font-size="11" fill="#ccc">슬래시 커맨드: /write-chapter, /diagram ...</text>

  <!-- Connection lines -->
  <line x1="450" y1="145" x2="450" y2="160" stroke="#666" stroke-width="1.5"/>
  <line x1="350" y1="210" x2="265" y2="225" stroke="#666" stroke-width="1.5"/>
  <line x1="550" y1="210" x2="615" y2="225" stroke="#666" stroke-width="1.5"/>

  <!-- What goes in CLAUDE.md for writing -->
  <text x="450" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">저작 프로젝트 CLAUDE.md에 포함할 5가지</text>

  <g transform="translate(60, 320)">
    <rect x="0" y="0" width="155" height="80" rx="4" fill="none" stroke="#555" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">문체 규칙</text>
    <line x1="15" y1="30" x2="140" y2="30" stroke="#eee" stroke-width="0.5"/>
    <text x="78" y="48" text-anchor="middle" font-size="10.5" fill="#777">평서문 체계</text>
    <text x="78" y="64" text-anchor="middle" font-size="10.5" fill="#777">"이+명사" 금지</text>
    <text x="78" y="78" text-anchor="middle" font-size="10.5" fill="#777">AI 티 제거</text>
  </g>

  <g transform="translate(230, 320)">
    <rect x="0" y="0" width="155" height="80" rx="4" fill="none" stroke="#555" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">용어 규칙</text>
    <line x1="15" y1="30" x2="140" y2="30" stroke="#eee" stroke-width="0.5"/>
    <text x="78" y="48" text-anchor="middle" font-size="10.5" fill="#777">첫 등장: 한글(영어)</text>
    <text x="78" y="64" text-anchor="middle" font-size="10.5" fill="#777">재등장: 한글만</text>
    <text x="78" y="78" text-anchor="middle" font-size="10.5" fill="#777">브랜드 원어 유지</text>
  </g>

  <g transform="translate(400, 320)">
    <rect x="0" y="0" width="155" height="80" rx="4" fill="none" stroke="#555" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">다이어그램 스펙</text>
    <line x1="15" y1="30" x2="140" y2="30" stroke="#eee" stroke-width="0.5"/>
    <text x="78" y="48" text-anchor="middle" font-size="10.5" fill="#777">Tufte grayscale</text>
    <text x="78" y="64" text-anchor="middle" font-size="10.5" fill="#777">Palatino 서체</text>
    <text x="78" y="78" text-anchor="middle" font-size="10.5" fill="#777">SVG 전용</text>
  </g>

  <g transform="translate(570, 320)">
    <rect x="0" y="0" width="155" height="80" rx="4" fill="none" stroke="#555" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">프로젝트 구조</text>
    <line x1="15" y1="30" x2="140" y2="30" stroke="#eee" stroke-width="0.5"/>
    <text x="78" y="48" text-anchor="middle" font-size="10.5" fill="#777">chapters/ 폴더</text>
    <text x="78" y="64" text-anchor="middle" font-size="10.5" fill="#777">p0-/p1-/p2- 접두어</text>
    <text x="78" y="78" text-anchor="middle" font-size="10.5" fill="#777">images/ 참조 경로</text>
  </g>

  <g transform="translate(740, 320)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="none" stroke="#555" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">스킬 안내</text>
    <line x1="15" y1="30" x2="105" y2="30" stroke="#eee" stroke-width="0.5"/>
    <text x="60" y="48" text-anchor="middle" font-size="10.5" fill="#777">17개 커맨드</text>
    <text x="60" y="64" text-anchor="middle" font-size="10.5" fill="#777">용도별 분류</text>
    <text x="60" y="78" text-anchor="middle" font-size="10.5" fill="#777">호출 방법</text>
  </g>

  <!-- Bottom -->
  <rect x="140" y="418" width="620" height="44" rx="3" fill="#f0f0f0"/>
  <text x="450" y="437" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">CLAUDE.md는 저작의 "건축 도면"이다</text>
  <text x="450" y="454" text-anchor="middle" font-size="11" fill="#666">컨텍스트 품질이 AI 출력 품질을 결정한다 -- 50줄이 500줄보다 낫다</text>
</svg>