<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <rect width="900" height="400" fill="#fafafa" rx="4"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">코딩 도구에서 저작 도구로 -- Claude Code의 본질</text>
  <line x1="100" y1="50" x2="800" y2="50" stroke="#999" stroke-width="0.5"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Core capabilities -->
  <text x="450" y="80" text-anchor="middle" font-size="13" fill="#888">Claude Code의 핵심 기능 4가지</text>

  <rect x="70" y="95" width="170" height="65" rx="5" fill="#444"/>
  <text x="155" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">파일 읽기/쓰기</text>
  <text x="155" y="140" text-anchor="middle" font-size="11" fill="#ccc">Read, Edit, Write</text>

  <rect x="260" y="95" width="170" height="65" rx="5" fill="#555"/>
  <text x="345" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">구조 이해</text>
  <text x="345" y="140" text-anchor="middle" font-size="11" fill="#ccc">Glob, Grep, Agent</text>

  <rect x="450" y="95" width="170" height="65" rx="5" fill="#666"/>
  <text x="535" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">명령 실행</text>
  <text x="535" y="140" text-anchor="middle" font-size="11" fill="#ccc">Bash, Render, Git</text>

  <rect x="640" y="95" width="190" height="65" rx="5" fill="#777"/>
  <text x="735" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">자연어 대화</text>
  <text x="735" y="140" text-anchor="middle" font-size="11" fill="#ccc">지시, 피드백, 반복</text>

  <!-- Fork arrows -->
  <line x1="450" y1="170" x2="250" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="170" x2="650" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Left: Coding -->
  <rect x="70" y="215" width="360" height="140" rx="5" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="250" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">코딩에 적용하면</text>
  <text x="90" y="268" font-size="12" fill="#777">소스코드 읽기/편집</text>
  <text x="90" y="290" font-size="12" fill="#777">프로젝트 구조 탐색</text>
  <text x="90" y="312" font-size="12" fill="#777">테스트 실행, 빌드</text>
  <text x="90" y="334" font-size="12" fill="#777">"로그인 버그 고쳐줘"</text>
  <text x="290" y="268" font-size="12" fill="#999" font-style="italic">= 소프트웨어 개발</text>

  <!-- Right: Writing -->
  <rect x="470" y="215" width="380" height="140" rx="5" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="660" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">글쓰기에 적용하면</text>
  <text x="490" y="268" font-size="12" fill="#555">원고(.qmd) 읽기/편집</text>
  <text x="490" y="290" font-size="12" fill="#555">챕터 구조, 용어 일관성 탐색</text>
  <text x="490" y="312" font-size="12" fill="#555">Quarto 렌더링, Git 커밋</text>
  <text x="490" y="334" font-size="12" fill="#555">"3장 도입부 보강해줘"</text>
  <text x="720" y="268" font-size="12" fill="#444" font-style="italic">= 기술 저작</text>

  <!-- Bottom insight -->
  <rect x="140" y="368" width="620" height="24" rx="3" fill="#f0f0f0"/>
  <text x="450" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">같은 도구, 같은 기능 -- 대상만 코드에서 원고로 바뀐다</text>
</svg>