<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <rect width="900" height="340" fill="#fafafa" rx="4"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">슬롭스쿼팅 -- AI 환각이 만드는 공급망 공격</text>
  <line x1="100" y1="50" x2="800" y2="50" stroke="#999" stroke-width="0.5"/>
  <defs>
    <marker id="arS" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="40" y="80" width="150" height="80" rx="5" fill="#555"/>
  <text x="115" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">LLM 코드 생성</text>
  <text x="115" y="130" text-anchor="middle" font-size="10" fill="#ccc">"pandas-utils를</text>
  <text x="115" y="145" text-anchor="middle" font-size="10" fill="#ccc"> 설치하세요"</text>

  <line x1="190" y1="120" x2="228" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Step 2 -->
  <rect x="230" y="80" width="150" height="80" rx="5" fill="#666"/>
  <text x="305" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">환각 패키지 추천</text>
  <text x="305" y="128" text-anchor="middle" font-size="11" fill="#ddd">존재하지 않는 패키지</text>
  <text x="305" y="148" text-anchor="middle" font-size="10" fill="#bbb">20% 확률로 발생</text>

  <line x1="380" y1="120" x2="418" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Step 3 -->
  <rect x="420" y="80" width="150" height="80" rx="5" fill="#777"/>
  <text x="495" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">개발자 설치</text>
  <text x="495" y="128" text-anchor="middle" font-size="11" fill="#eee">pip install</text>
  <text x="495" y="148" text-anchor="middle" font-size="10" fill="#ddd">pandas-utils</text>

  <line x1="570" y1="120" x2="608" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Step 4 -->
  <rect x="610" y="80" width="150" height="80" rx="5" fill="#333"/>
  <text x="685" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">공격자 등록</text>
  <text x="685" y="128" text-anchor="middle" font-size="11" fill="#ccc">동일 이름으로</text>
  <text x="685" y="148" text-anchor="middle" font-size="10" fill="#aaa">악성 패키지 업로드</text>

  <line x1="760" y1="120" x2="800" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Result -->
  <rect x="800" y="85" width="70" height="70" rx="5" fill="#444"/>
  <text x="835" y="118" text-anchor="middle" font-size="28" fill="#fff">!</text>
  <text x="835" y="145" text-anchor="middle" font-size="9" fill="#ccc">침해</text>

  <!-- Stats -->
  <rect x="40" y="185" width="820" height="70" rx="5" fill="none" stroke="#888" stroke-width="1"/>
  <text x="60" y="210" font-size="13" font-weight="bold" fill="#444">실증 데이터</text>

  <text x="60" y="237" font-size="12" fill="#555">576,000개 샘플 분석</text>
  <text x="270" y="237" font-size="12" fill="#555">20% 환각률</text>
  <text x="420" y="237" font-size="12" fill="#555">43% 반복 재등장</text>
  <text x="600" y="237" font-size="12" fill="#555">huggingface-cli: 30,000건 다운로드</text>

  <!-- Defense -->
  <rect x="40" y="270" width="820" height="55" rx="5" fill="#f0f0f0"/>
  <text x="60" y="292" font-size="12" font-weight="bold" fill="#333">방어 전략</text>
  <text x="60" y="314" font-size="11" fill="#666">lockfile 사용 + 해시 고정 + 의존성 스캐너(Dependabot) + AI temperature 낮추기 + 격리 환경 실행</text>
</svg>