<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Palatino Linotype, Georgia, serif">
  <defs>
    <marker id="gl-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#003876" opacity="0.5"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#FEFEFE"/>

  <!-- 슬라이드 제목이 있으므로 SVG 타이틀 생략 -->

  <!-- ═══════════════════════════════════════════ -->
  <!--  Center: 대한민국 문서 (이미 Lv.4)           -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="215" y="125" width="190" height="85" rx="5" fill="none" stroke="#003876" stroke-width="2"/>
  <text x="310" y="150" text-anchor="middle" font-size="14" fill="#003876" font-weight="700">대한민국 공식 문서</text>
  <text x="310" y="170" text-anchor="middle" font-size="11" fill="#555">HWPX · 전자세금계산서 · DART</text>
  <text x="310" y="190" text-anchor="middle" font-size="11" fill="#555">법제처 · 나라장터 · 정부24</text>
  <text x="310" y="205" text-anchor="middle" font-size="10" fill="#888">Lv.4 (국가 체계 완성)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--  4 global forces                            -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Force 1: 국제 표준 기구 (top) -->
  <rect x="230" y="15" width="160" height="42" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="310" y="37" text-anchor="middle" font-size="11.5" fill="#555" font-weight="600">국제 표준 기구</text>
  <text x="310" y="51" text-anchor="middle" font-size="10" fill="#888">ISO · W3C · OASIS · UN</text>

  <line x1="310" y1="57" x2="310" y2="123" stroke="#555" stroke-width="1" opacity="0.35" marker-end="url(#gl-a)"/>

  <g transform="translate(-70, 5)">
    <text x="410" y="78" font-size="10.5" fill="#555">"국제 표준 준수 의무"</text>
    <text x="410" y="92" font-size="10" fill="#888" font-style="italic">+ ISO 19845(UBL) · XML Schema</text>
  </g>

  <!-- Force 2: 교역국 규제 (right) -->
  <rect x="475" y="140" width="145" height="55" rx="4" fill="none" stroke="#c0392b" stroke-width="1.2"/>
  <text x="547" y="162" text-anchor="middle" font-size="11.5" fill="#c0392b" font-weight="600">교역국 규제</text>
  <text x="547" y="177" text-anchor="middle" font-size="10" fill="#888">EU GDPR · 미국 SEC</text>
  <text x="547" y="190" text-anchor="middle" font-size="10" fill="#888">중국 데이터법 · 일본 JIS</text>

  <line x1="475" y1="167" x2="407" y2="167" stroke="#c0392b" stroke-width="1" opacity="0.35" marker-end="url(#gl-a)"/>

  <g transform="translate(20, 0)">
    <text x="455" y="210" font-size="10.5" fill="#c0392b">"각국 법률에 맞춰 제출"</text>
    <text x="455" y="224" font-size="10" fill="#888" font-style="italic">+ 다중 관할권 · 개인정보 규정</text>
  </g>  

  <!-- Force 3: 다국적 기업·파트너 (bottom) -->
  <rect x="220" y="275" width="180" height="42" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="310" y="297" text-anchor="middle" font-size="11.5" fill="#555" font-weight="600">다국적 기업 · 파트너</text>
  <text x="310" y="311" text-anchor="middle" font-size="10" fill="#888">삼성↔Apple · 현대↔BMW · SK↔Shell</text>

  <line x1="310" y1="275" x2="310" y2="212" stroke="#555" stroke-width="1" opacity="0.35" marker-end="url(#gl-a)"/>

  <g transform="translate(-70, -20)">
    <text x="415" y="265" font-size="10.5" fill="#555">"우리 시스템에 연동해줘"</text>
    <text x="415" y="279" font-size="10" fill="#888" font-style="italic">+ SAP·Oracle 포맷 · EDI · API 스펙</text>
  </g>

  <!-- Force 4: 다국어·다문화 (left) -->
  <rect x="50" y="140" width="115" height="55" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="107" y="162" text-anchor="middle" font-size="11.5" fill="#555" font-weight="600">다국어 · 다문화</text>
  <text x="107" y="177" text-anchor="middle" font-size="10" fill="#888">영·중·일·아랍어</text>
  <text x="107" y="190" text-anchor="middle" font-size="10" fill="#888">RTL · 날짜 · 단위</text>

  <line x1="165" y1="167" x2="213" y2="167" stroke="#555" stroke-width="1" opacity="0.35" marker-end="url(#gl-a)"/>

  <text x="55" y="210" font-size="10.5" fill="#555">"한국어만으로는 불가"</text>
  <text x="55" y="224" font-size="10" fill="#888" font-style="italic">+ 번역·현지화·RTL 레이아웃</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--  Bottom                                     -->
  <!-- ═══════════════════════════════════════════ -->

  <line x1="50" y1="335" x2="630" y2="335" stroke="#003876" stroke-width="0.5" opacity="0.15"/>

  <text x="55" y="357" font-size="10.5" fill="#555" letter-spacing="1.5px">글로벌 충돌 — 국가 문서 체계가 세계를 만날 때</text>

  <text x="65" y="383" font-size="12" fill="#888">국가 내</text>
  <text x="175" y="383" font-size="12" fill="#555">Lv.4 (HWPX + 전자세금계산서 + DART + 법제처)</text>

  <text x="65" y="407" font-size="12" fill="#c0392b" font-weight="600">글로벌</text>
  <text x="175" y="407" font-size="12" fill="#555">Lv.4 × 다중 관할권 × 국제 표준 × 다국어 =</text>
  <text x="465" y="407" font-size="14" fill="#c0392b" font-weight="700">Lv.∞</text>

  <line x1="55" y1="428" x2="60" y2="428" stroke="#003876" stroke-width="2.5"/>
  <text x="70" y="432" font-size="12" fill="#444">국가 표준만으로는 해결 불가 — S1000D · eCTD · XBRL 같은 국제 표준이 존재하는 이유</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--  Margin notes                               -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="710" y="50" font-size="10" fill="#888" font-style="italic">한국 고유 문제:</text>
  <text x="710" y="67" font-size="10" fill="#888" font-style="italic">HWPX는 국내에서만 통용.</text>
  <text x="710" y="82" font-size="10" fill="#888" font-style="italic">해외에서 HWPX 열 수 있는</text>
  <text x="710" y="97" font-size="10" fill="#888" font-style="italic">소프트웨어 = 없음.</text>

  <text x="710" y="145" font-size="10" fill="#888" font-style="italic">GDPR 사례:</text>
  <text x="710" y="162" font-size="10" fill="#888" font-style="italic">한국 기업이 EU에 서비스</text>
  <text x="710" y="177" font-size="10" fill="#888" font-style="italic">→ 모든 개인정보 문서를</text>
  <text x="710" y="192" font-size="10" fill="#888" font-style="italic">GDPR 형식으로 재작성.</text>

  <text x="710" y="240" font-size="10" fill="#888" font-style="italic">해법:</text>
  <text x="710" y="257" font-size="10" fill="#888" font-style="italic">국제 표준 포맷으로 작성</text>
  <text x="710" y="272" font-size="10" fill="#888" font-style="italic">(ODF · PDF/A · XML)</text>
  <text x="710" y="290" font-size="10" fill="#888" font-style="italic">+ Quarto OSMU로</text>
  <text x="710" y="305" font-size="10" fill="#888" font-style="italic">단일 소스 → 다국어</text>
  <text x="710" y="320" font-size="10" fill="#888" font-style="italic">다중 포맷 동시 생성.</text>

  <text x="710" y="380" font-size="10" fill="#888" font-style="italic">Glushko 원칙의 극한:</text>
  <text x="710" y="397" font-size="10" fill="#888" font-style="italic">Component = 각국 데이터</text>
  <text x="710" y="412" font-size="10" fill="#888" font-style="italic">Assembly = 국제 문서</text>
  <text x="710" y="427" font-size="10" fill="#888" font-style="italic">Context = 관할권별 의미</text>

  <line x1="50" y1="448" x2="630" y2="448" stroke="#eee" stroke-width="0.5"/>
</svg>