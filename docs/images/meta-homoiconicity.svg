<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Palatino, 'Book Antiqua', Georgia, serif">
  <defs>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666666"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#666666"/>
    </marker>
    <marker id="arrowFlow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">동형성: 코드는 데이터다</text>
  <text x="400" y="52" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">Lisp의 S-expression — 코드와 데이터가 동일한 트리 구조를 공유한다</text>

  <!-- Dividing line under title -->
  <line x1="120" y1="62" x2="680" y2="62" stroke="#CCCCCC" stroke-width="0.5"/>

  <!-- LEFT SIDE: Code -->
  <rect x="40" y="80" width="310" height="210" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="195" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">코드 (Code)</text>
  <line x1="100" y1="112" x2="290" y2="112" stroke="#CCCCCC" stroke-width="0.5"/>

  <!-- Code representation -->
  <text x="195" y="145" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">Lisp 소스 코드</text>

  <rect x="80" y="160" width="230" height="50" rx="3" fill="white" stroke="#CCCCCC" stroke-width="1"/>
  <text x="195" y="190" text-anchor="middle" font-size="16" fill="#333333" font-family="Consolas, 'Courier New', monospace">(+ 1 (* 2 3))</text>

  <text x="195" y="240" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">텍스트로 작성된 표현식</text>
  <text x="195" y="258" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">— 프로그래머가 읽고 쓰는 형태</text>

  <!-- RIGHT SIDE: Data -->
  <rect x="450" y="80" width="310" height="210" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="605" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">데이터 (Data)</text>
  <line x1="510" y1="112" x2="700" y2="112" stroke="#CCCCCC" stroke-width="0.5"/>

  <!-- Tree representation -->
  <text x="605" y="145" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">S-expression 트리 구조</text>

  <!-- Tree nodes and edges -->
  <!-- Root: + -->
  <circle cx="605" cy="175" r="14" fill="white" stroke="#999999" stroke-width="1"/>
  <text x="605" y="180" text-anchor="middle" font-size="14" fill="#333333" font-family="Consolas, 'Courier New', monospace">+</text>

  <!-- Left child: 1 -->
  <line x1="593" y1="187" x2="545" y2="218" stroke="#999999" stroke-width="1"/>
  <circle cx="540" cy="225" r="14" fill="white" stroke="#999999" stroke-width="1"/>
  <text x="540" y="230" text-anchor="middle" font-size="14" fill="#333333" font-family="Consolas, 'Courier New', monospace">1</text>

  <!-- Right child: * -->
  <line x1="617" y1="187" x2="665" y2="218" stroke="#999999" stroke-width="1"/>
  <circle cx="670" cy="225" r="14" fill="white" stroke="#999999" stroke-width="1"/>
  <text x="670" y="230" text-anchor="middle" font-size="14" fill="#333333" font-family="Consolas, 'Courier New', monospace">*</text>

  <!-- Grandchild left: 2 -->
  <line x1="658" y1="237" x2="635" y2="258" stroke="#999999" stroke-width="1"/>
  <circle cx="630" cy="265" r="14" fill="white" stroke="#999999" stroke-width="1"/>
  <text x="630" y="270" text-anchor="middle" font-size="14" fill="#333333" font-family="Consolas, 'Courier New', monospace">2</text>

  <!-- Grandchild right: 3 -->
  <line x1="682" y1="237" x2="705" y2="258" stroke="#999999" stroke-width="1"/>
  <circle cx="710" cy="265" r="14" fill="white" stroke="#999999" stroke-width="1"/>
  <text x="710" y="270" text-anchor="middle" font-size="14" fill="#333333" font-family="Consolas, 'Courier New', monospace">3</text>

  <!-- CENTER: Double-headed arrow -->
  <line x1="358" y1="190" x2="442" y2="190" stroke="#999999" stroke-width="1.5" marker-start="url(#arrowLeft)" marker-end="url(#arrowRight)"/>
  <text x="400" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">동일한 구조</text>
  <text x="400" y="210" text-anchor="middle" font-size="20" fill="#666666">↔</text>

  <!-- BOTTOM: Three implication boxes -->
  <line x1="120" y1="310" x2="680" y2="310" stroke="#CCCCCC" stroke-width="0.5"/>
  <text x="400" y="330" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">동형성이 가능하게 하는 메타프로그래밍 흐름</text>

  <!-- Box 1: 읽기 -->
  <rect x="75" y="345" width="190" height="50" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="170" y="367" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">읽기 (Read)</text>
  <text x="170" y="384" text-anchor="middle" font-size="11" fill="#666666">코드를 데이터로 분석</text>

  <!-- Arrow 1→2 -->
  <line x1="270" y1="370" x2="300" y2="370" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Box 2: 변환 -->
  <rect x="305" y="345" width="190" height="50" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="400" y="367" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">변환 (Transform)</text>
  <text x="400" y="384" text-anchor="middle" font-size="11" fill="#666666">구조를 수정</text>

  <!-- Arrow 2→3 -->
  <line x1="500" y1="370" x2="530" y2="370" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Box 3: 생성 -->
  <rect x="535" y="345" width="190" height="50" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="630" y="367" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">생성 (Emit)</text>
  <text x="630" y="384" text-anchor="middle" font-size="11" fill="#666666">새 코드 출력</text>
</svg>