<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <!-- Background -->
  <rect width="900" height="460" fill="#fafafa" rx="4"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">문서의 분화 — 소멸이 아니라 진화</text>
  <line x1="150" y1="52" x2="750" y2="52" stroke="#999" stroke-width="0.5"/>

  <!-- Central trunk -->
  <rect x="340" y="70" width="220" height="50" rx="6" fill="#444" stroke="none"/>
  <text x="450" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">전통적 문서</text>

  <!-- Trunk line down -->
  <line x1="450" y1="120" x2="450" y2="160" stroke="#555" stroke-width="2"/>

  <!-- Fork point -->
  <circle cx="450" cy="170" r="8" fill="#555"/>
  <text x="450" y="174" text-anchor="middle" font-size="10" fill="#fff">AI</text>

  <!-- Left branch -->
  <line x1="450" y1="170" x2="225" y2="220" stroke="#555" stroke-width="2"/>
  <!-- Right branch -->
  <line x1="450" y1="170" x2="675" y2="220" stroke="#555" stroke-width="2"/>

  <!-- Left: Human-readable -->
  <rect x="50" y="220" width="350" height="200" rx="6" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="50" y="220" width="350" height="42" rx="6" fill="#555"/>
  <text x="225" y="246" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">사람이 읽는 문서 (Human-readable)</text>

  <g transform="translate(75, 285)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#555">유형</text>
    <text x="145" y="0" font-size="12" font-weight="bold" fill="#555">도구</text>
  </g>
  <line x1="75" y1="292" x2="375" y2="292" stroke="#ddd" stroke-width="0.5"/>

  <g transform="translate(75, 312)">
    <text x="0" y="0" font-size="12" fill="#666">보고서·논문</text>
    <text x="145" y="0" font-size="12" fill="#666">Quarto, LaTeX, Typst</text>
  </g>
  <g transform="translate(75, 334)">
    <text x="0" y="0" font-size="12" fill="#666">매뉴얼·가이드</text>
    <text x="145" y="0" font-size="12" fill="#666">Markdown, DITA</text>
  </g>
  <g transform="translate(75, 356)">
    <text x="0" y="0" font-size="12" fill="#666">대시보드</text>
    <text x="145" y="0" font-size="12" fill="#666">Quarto + Observable JS</text>
  </g>
  <g transform="translate(75, 378)">
    <text x="0" y="0" font-size="12" fill="#666">발표자료</text>
    <text x="145" y="0" font-size="12" fill="#666">Quarto Revealjs</text>
  </g>
  <g transform="translate(75, 400)">
    <text x="0" y="0" font-size="12" fill="#888" font-style="italic">목적: 설득, 전달, 기록</text>
  </g>

  <!-- Right: Machine-readable -->
  <rect x="500" y="220" width="350" height="200" rx="6" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="500" y="220" width="350" height="42" rx="6" fill="#333"/>
  <text x="675" y="246" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">기계가 읽는 문서 (Machine-readable)</text>

  <g transform="translate(525, 285)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#555">유형</text>
    <text x="145" y="0" font-size="12" font-weight="bold" fill="#555">용도</text>
  </g>
  <line x1="525" y1="292" x2="825" y2="292" stroke="#ddd" stroke-width="0.5"/>

  <g transform="translate(525, 312)">
    <text x="0" y="0" font-size="12" fill="#666">CLAUDE.md</text>
    <text x="145" y="0" font-size="12" fill="#666">AI 에이전트 컨텍스트</text>
  </g>
  <g transform="translate(525, 334)">
    <text x="0" y="0" font-size="12" fill="#666">llms.txt</text>
    <text x="145" y="0" font-size="12" fill="#666">사이트 AI 가독성</text>
  </g>
  <g transform="translate(525, 356)">
    <text x="0" y="0" font-size="12" fill="#666">AGENTS.md</text>
    <text x="145" y="0" font-size="12" fill="#666">범용 에이전트 지시</text>
  </g>
  <g transform="translate(525, 378)">
    <text x="0" y="0" font-size="12" fill="#666">OpenAPI spec</text>
    <text x="145" y="0" font-size="12" fill="#666">API 자동 문서화</text>
  </g>
  <g transform="translate(525, 400)">
    <text x="0" y="0" font-size="12" fill="#888" font-style="italic">목적: 지시, 자동화, 맥락 전달</text>
  </g>

  <!-- Bottom: shared foundation -->
  <rect x="100" y="432" width="700" height="22" rx="3" fill="#f0f0f0"/>
  <text x="450" y="448" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">공통점: 구조화된 텍스트 · 버전 관리 · 정확성이 생명</text>
</svg>