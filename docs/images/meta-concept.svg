<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="Palatino, 'Book Antiqua', Georgia, serif">
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <marker id="arrowhead-dashed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">메타프로그래밍의 핵심 개념</text>
  <!-- Subtitle -->
  <text x="400" y="52" text-anchor="middle" font-size="13" font-style="italic" fill="#666666">프로그램이 프로그램을 작성한다</text>

  <!-- ============================================ -->
  <!-- TOP LANE: 일반 프로그래밍                      -->
  <!-- ============================================ -->

  <!-- Lane label -->
  <text x="30" y="105" font-size="14" font-weight="bold" fill="#333333">일반</text>
  <text x="30" y="121" font-size="14" font-weight="bold" fill="#333333">프로그래밍</text>

  <!-- Box: 데이터 -->
  <rect x="130" y="88" width="130" height="42" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="195" y="114" text-anchor="middle" font-size="13" fill="#333333">데이터</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="109" x2="328" y2="109" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Box: 프로그램 -->
  <rect x="330" y="88" width="140" height="42" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="400" y="114" text-anchor="middle" font-size="13" fill="#333333">프로그램</text>

  <!-- Arrow 2 -->
  <line x1="470" y1="109" x2="538" y2="109" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Box: 결과 -->
  <rect x="540" y="88" width="130" height="42" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="605" y="114" text-anchor="middle" font-size="13" fill="#333333">결과</text>

  <!-- Caption for top lane -->
  <text x="195" y="148" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">예: 숫자</text>
  <text x="400" y="148" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">예: 정렬 함수</text>
  <text x="605" y="148" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">예: 정렬된 숫자</text>

  <!-- ============================================ -->
  <!-- DIVIDER: "프로그램 = 데이터"                   -->
  <!-- ============================================ -->

  <line x1="100" y1="185" x2="700" y2="185" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Central concept label -->
  <rect x="310" y="172" width="180" height="26" rx="3" fill="white" stroke="#999999" stroke-width="1"/>
  <text x="400" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">프로그램 = 데이터</text>

  <!-- Vertical dashed connectors -->
  <line x1="400" y1="130" x2="400" y2="172" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="198" x2="400" y2="230" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============================================ -->
  <!-- BOTTOM LANE: 메타프로그래밍                    -->
  <!-- ============================================ -->

  <!-- Lane label -->
  <text x="30" y="251" font-size="14" font-weight="bold" fill="#333333">메타</text>
  <text x="30" y="267" font-size="14" font-weight="bold" fill="#333333">프로그래밍</text>

  <!-- Box: 코드/명세 -->
  <rect x="130" y="234" width="130" height="42" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="195" y="260" text-anchor="middle" font-size="13" fill="#333333">코드 / 명세</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="255" x2="328" y2="255" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Box: 메타프로그램 -->
  <rect x="330" y="234" width="140" height="42" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="400" y="260" text-anchor="middle" font-size="13" fill="#333333">메타프로그램</text>

  <!-- Arrow 2 -->
  <line x1="470" y1="255" x2="538" y2="255" stroke="#999999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Box: 새로운 프로그램 -->
  <rect x="540" y="234" width="150" height="42" rx="3" fill="#F5F5F5" stroke="#999999" stroke-width="1"/>
  <text x="615" y="260" text-anchor="middle" font-size="13" fill="#333333">새로운 프로그램</text>

  <!-- Caption for bottom lane -->
  <text x="195" y="294" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">예: 문법 명세</text>
  <text x="400" y="294" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">예: yacc</text>
  <text x="615" y="294" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">예: 파서 코드</text>

  <!-- ============================================ -->
  <!-- Subtle vertical alignment guides (arrows)   -->
  <!-- connecting corresponding boxes               -->
  <!-- ============================================ -->

  <!-- Left boxes vertical connector -->
  <line x1="195" y1="130" x2="195" y2="234" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="3,4"/>

  <!-- Right boxes vertical connector -->
  <line x1="605" y1="130" x2="605" y2="234" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="3,4"/>

  <!-- Footer note -->
  <text x="400" y="335" text-anchor="middle" font-size="11" fill="#999999">일반 프로그래밍의 '데이터'가 메타프로그래밍에서는 '코드'로 대체된다</text>
</svg>