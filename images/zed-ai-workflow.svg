<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <style>
      .tufte-text {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #333;
      }
      .tufte-label {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #666;
        font-size: 13px;
      }
      .tufte-title {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #333;
        font-size: 16px;
        font-weight: bold;
      }
      .tufte-small {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #666;
        font-size: 11px;
      }
      .tufte-code {
        font-family: 'Monaco', 'Courier New', monospace;
        fill: #333;
        font-size: 10px;
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" class="tufte-title" text-anchor="middle">Zed AI 워크플로우</text>

  <!-- Step 1: Developer Input -->
  <rect x="320" y="60" width="260" height="70" fill="#f5f5f5" stroke="#999" stroke-width="1.5" rx="5"/>
  <text x="450" y="85" class="tufte-text" text-anchor="middle" font-weight="bold">1. 개발자 입력</text>
  <text x="450" y="105" class="tufte-label" text-anchor="middle">코드 선택 + AI 요청</text>
  <text x="450" y="120" class="tufte-small" text-anchor="middle">(Cmd/Ctrl + I 또는 Assistant 패널)</text>

  <!-- Arrow -->
  <line x1="450" y1="130" x2="450" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Context Collection -->
  <rect x="280" y="160" width="340" height="120" fill="#fafafa" stroke="#999" stroke-width="1.5" rx="5"/>
  <text x="450" y="185" class="tufte-text" text-anchor="middle" font-weight="bold">2. 컨텍스트 수집</text>

  <!-- Context items -->
  <rect x="300" y="200" width="140" height="60" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <text x="310" y="217" class="tufte-small" font-weight="bold">파일 컨텍스트</text>
  <text x="310" y="232" class="tufte-small">• 현재 파일 전체</text>
  <text x="310" y="246" class="tufte-small">• Import 문</text>
  <text x="310" y="260" class="tufte-small">• 선택 영역</text>

  <rect x="460" y="200" width="140" height="60" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <text x="470" y="217" class="tufte-small" font-weight="bold">프로젝트 컨텍스트</text>
  <text x="470" y="232" class="tufte-small">• 타입 정의</text>
  <text x="470" y="246" class="tufte-small">• 함수 시그니처</text>
  <text x="470" y="260" class="tufte-small">• 프로젝트 구조</text>

  <!-- Arrow -->
  <line x1="450" y1="280" x2="450" y2="310" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 3: LLM API Call -->
  <rect x="320" y="310" width="260" height="90" fill="#e5e5e5" stroke="#999" stroke-width="1.5" rx="5"/>
  <text x="450" y="335" class="tufte-text" text-anchor="middle" font-weight="bold">3. LLM API 호출</text>
  <text x="450" y="355" class="tufte-small" text-anchor="middle">컨텍스트 + 요청을 포함한 프롬프트 생성</text>

  <!-- API providers -->
  <text x="340" y="375" class="tufte-small">GPT-4</text>
  <text x="395" y="375" class="tufte-small">Claude</text>
  <text x="450" y="375" class="tufte-small">Copilot</text>
  <text x="515" y="375" class="tufte-small">Ollama</text>

  <rect x="335" y="365" width="45" height="15" fill="none" stroke="#666" stroke-width="0.5" rx="2"/>
  <rect x="390" y="365" width="45" height="15" fill="none" stroke="#999" stroke-width="0.5" rx="2"/>
  <rect x="445" y="365" width="50" height="15" fill="none" stroke="#999" stroke-width="0.5" rx="2"/>
  <rect x="510" y="365" width="50" height="15" fill="none" stroke="#999" stroke-width="0.5" rx="2"/>

  <!-- Arrow -->
  <line x1="450" y1="400" x2="450" y2="430" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 4: AI Response -->
  <rect x="320" y="430" width="260" height="80" fill="#f5f5f5" stroke="#999" stroke-width="1.5" rx="5"/>
  <text x="450" y="455" class="tufte-text" text-anchor="middle" font-weight="bold">4. AI 응답 생성</text>
  <rect x="335" y="465" width="230" height="35" fill="#ffffff" stroke="#ccc" stroke-width="0.5" rx="2"/>
  <text x="345" y="480" class="tufte-code">function validateEmail(email: string) {</text>
  <text x="345" y="493" class="tufte-code">  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);</text>

  <!-- Arrow -->
  <line x1="450" y1="510" x2="450" y2="540" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Developer Review -->
  <rect x="320" y="540" width="260" height="60" fill="#fafafa" stroke="#999" stroke-width="1.5" rx="5"/>
  <text x="450" y="565" class="tufte-text" text-anchor="middle" font-weight="bold">5. 개발자 검토</text>
  <text x="450" y="583" class="tufte-label" text-anchor="middle">AI 제안 확인 및 평가</text>

  <!-- Decision arrows -->
  <line x1="380" y1="600" x2="250" y2="640" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="520" y1="600" x2="650" y2="640" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <text x="300" y="625" class="tufte-label">적용</text>
  <text x="590" y="625" class="tufte-label">거부/수정</text>

  <!-- Step 6a: Apply -->
  <rect x="120" y="640" width="160" height="50" fill="#e5e5e5" stroke="#666" stroke-width="1.5" rx="5"/>
  <text x="200" y="665" class="tufte-text" text-anchor="middle" font-weight="bold">6a. 코드 적용</text>
  <text x="200" y="680" class="tufte-small" text-anchor="middle">에디터에 삽입</text>

  <!-- Step 6b: Reject/Modify -->
  <rect x="570" y="640" width="160" height="50" fill="#f5f5f5" stroke="#999" stroke-width="1.5" rx="5"/>
  <text x="650" y="665" class="tufte-text" text-anchor="middle" font-weight="bold">6b. 거부/수정</text>
  <text x="650" y="680" class="tufte-small" text-anchor="middle">추가 요청 또는 삭제</text>

  <!-- Side panel: Example Request -->
  <rect x="50" y="160" width="200" height="140" fill="#fafafa" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="60" y="180" class="tufte-label" font-weight="bold">예시: 개발자 요청</text>
  <text x="60" y="200" class="tufte-small">"Add error handling</text>
  <text x="60" y="215" class="tufte-small">for this fetch call"</text>

  <rect x="70" y="230" width="170" height="55" fill="#ffffff" stroke="#999" stroke-width="0.5"/>
  <text x="75" y="243" class="tufte-code">fetch('/api/users')</text>
  <text x="75" y="256" class="tufte-code">  .then(r => r.json())</text>
  <text x="75" y="269" class="tufte-code">  .then(data => {</text>
  <text x="75" y="282" class="tufte-code">    console.log(data);</text>

  <!-- Arrow from example to context -->
  <line x1="250" y1="230" x2="280" y2="230" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowhead)"/>

  <!-- Side panel: Response Example -->
  <rect x="650" y="430" width="230" height="160" fill="#fafafa" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="660" y="450" class="tufte-label" font-weight="bold">예시: AI 응답</text>

  <rect x="660" y="460" width="210" height="120" fill="#ffffff" stroke="#999" stroke-width="0.5"/>
  <text x="665" y="473" class="tufte-code">fetch('/api/users')</text>
  <text x="665" y="486" class="tufte-code">  .then(r => {</text>
  <text x="665" y="499" class="tufte-code">    if (!r.ok) throw Error('Failed');</text>
  <text x="665" y="512" class="tufte-code">    return r.json();</text>
  <text x="665" y="525" class="tufte-code">  })</text>
  <text x="665" y="538" class="tufte-code">  .then(data => console.log(data))</text>
  <text x="665" y="551" class="tufte-code">  .catch(err => {</text>
  <text x="665" y="564" class="tufte-code">    console.error(err);</text>
  <text x="665" y="577" class="tufte-code">  });</text>

  <!-- Arrow from response to example -->
  <line x1="580" y1="470" x2="660" y2="470" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <text x="50" y="665" class="tufte-small" font-style="italic">주: 전체 프로세스는 1-3초 내 완료</text>
</svg>
