<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <defs>
    <style>
      .tufte-title { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 18px; fill: #222; font-weight: bold; }
      .tufte-subtitle { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 13px; fill: #666; }
      .tufte-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 13px; fill: #333; font-weight: bold; }
      .tufte-text { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #444; }
      .tufte-small { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 10px; fill: #666; }
      .tufte-date { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 9.5px; fill: #999; }
      .tufte-box { fill: #f9f9f9; stroke: #999; stroke-width: 1; }
      .tufte-box-hl { fill: #f0f0f0; stroke: #555; stroke-width: 1.5; }
      .tufte-line { stroke: #999; stroke-width: 1.5; }
      .tufte-arrow { fill: #666; }
      .row-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 12px; fill: #555; font-weight: bold; }
      .stage-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #777; font-style: italic; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="tufte-arrow"/>
    </marker>
  </defs>

  <rect width="900" height="440" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" class="tufte-title">문서 유형의 진화와 수렴</text>
  <text x="450" y="46" text-anchor="middle" class="tufte-subtitle">세 유형이 동일한 3단계 경로를 따라 Quarto에서 수렴한다</text>

  <!-- Column headers -->
  <text x="270" y="75" text-anchor="middle" class="stage-label">1단계: WYSIWYG</text>
  <text x="490" y="75" text-anchor="middle" class="stage-label">2단계: 도메인 마크업</text>
  <text x="710" y="75" text-anchor="middle" class="stage-label">3단계: 텍스트+AI</text>

  <!-- Row 1: Narrative -->
  <g transform="translate(0, 90)">
    <text x="55" y="28" text-anchor="middle" class="row-label">서사</text>
    <text x="55" y="43" text-anchor="middle" class="tufte-small">(Narrative)</text>
    <text x="55" y="58" text-anchor="middle" class="tufte-date">사람이 읽는 문서</text>

    <!-- Step 1 -->
    <rect x="140" y="5" width="130" height="60" class="tufte-box" rx="4"/>
    <text x="205" y="27" text-anchor="middle" class="tufte-label">Word / HWP</text>
    <text x="205" y="42" text-anchor="middle" class="tufte-small">바이너리, GUI 편집</text>
    <text x="205" y="55" text-anchor="middle" class="tufte-date">1984~</text>

    <line x1="275" y1="35" x2="310" y2="35" class="tufte-line" marker-end="url(#arr)"/>

    <!-- Step 2 -->
    <rect x="315" y="5" width="180" height="60" class="tufte-box" rx="4"/>
    <text x="405" y="22" text-anchor="middle" class="tufte-label">TeX → SGML → DocBook</text>
    <text x="405" y="37" text-anchor="middle" class="tufte-small">구조-표현 분리</text>
    <text x="405" y="52" text-anchor="middle" class="tufte-date">1978 → 1986 → 1991</text>

    <line x1="500" y1="35" x2="535" y2="35" class="tufte-line" marker-end="url(#arr)"/>

    <!-- Step 3 -->
    <rect x="540" y="5" width="180" height="60" class="tufte-box" rx="4"/>
    <text x="630" y="22" text-anchor="middle" class="tufte-label">Markdown → Quarto</text>
    <text x="630" y="37" text-anchor="middle" class="tufte-small">경량 마크업 + AI</text>
    <text x="630" y="52" text-anchor="middle" class="tufte-date">2004 → 2022</text>
  </g>

  <!-- Row 2: Hybrid -->
  <g transform="translate(0, 195)">
    <text x="55" y="28" text-anchor="middle" class="row-label">하이브리드</text>
    <text x="55" y="43" text-anchor="middle" class="tufte-small">(Hybrid)</text>
    <text x="55" y="58" text-anchor="middle" class="tufte-date">코드+산문 문서</text>

    <!-- Step 1 -->
    <rect x="140" y="5" width="130" height="60" class="tufte-box" rx="4"/>
    <text x="205" y="27" text-anchor="middle" class="tufte-label">Excel + Word</text>
    <text x="205" y="42" text-anchor="middle" class="tufte-small">복사-붙여넣기</text>
    <text x="205" y="55" text-anchor="middle" class="tufte-date">1990s~</text>

    <line x1="275" y1="35" x2="310" y2="35" class="tufte-line" marker-end="url(#arr)"/>

    <!-- Step 2 -->
    <rect x="315" y="5" width="180" height="60" class="tufte-box" rx="4"/>
    <text x="405" y="22" text-anchor="middle" class="tufte-label">Sweave → knitr → Jupyter</text>
    <text x="405" y="37" text-anchor="middle" class="tufte-small">문학적 프로그래밍</text>
    <text x="405" y="52" text-anchor="middle" class="tufte-date">2002 → 2012 → 2014</text>

    <line x1="500" y1="35" x2="535" y2="35" class="tufte-line" marker-end="url(#arr)"/>

    <!-- Step 3 -->
    <rect x="540" y="5" width="180" height="60" class="tufte-box" rx="4"/>
    <text x="630" y="22" text-anchor="middle" class="tufte-label">Quarto + AI</text>
    <text x="630" y="37" text-anchor="middle" class="tufte-small">다국어, 다출력</text>
    <text x="630" y="52" text-anchor="middle" class="tufte-date">2022~</text>
  </g>

  <!-- Row 3: Transactional -->
  <g transform="translate(0, 300)">
    <text x="55" y="28" text-anchor="middle" class="row-label">트랜잭션</text>
    <text x="55" y="43" text-anchor="middle" class="tufte-small">(Transactional)</text>
    <text x="55" y="58" text-anchor="middle" class="tufte-date">기계가 처리하는 문서</text>

    <!-- Step 1 -->
    <rect x="140" y="5" width="130" height="60" class="tufte-box" rx="4"/>
    <text x="205" y="27" text-anchor="middle" class="tufte-label">종이 양식</text>
    <text x="205" y="42" text-anchor="middle" class="tufte-small">수작업 대조</text>
    <text x="205" y="55" text-anchor="middle" class="tufte-date">~1960s</text>

    <line x1="275" y1="35" x2="310" y2="35" class="tufte-line" marker-end="url(#arr)"/>

    <!-- Step 2 -->
    <rect x="315" y="5" width="180" height="60" class="tufte-box" rx="4"/>
    <text x="405" y="22" text-anchor="middle" class="tufte-label">EDI → XML → JSON</text>
    <text x="405" y="37" text-anchor="middle" class="tufte-small">스키마 기반 교환</text>
    <text x="405" y="52" text-anchor="middle" class="tufte-date">1968 → 1998 → 2005</text>

    <line x1="500" y1="35" x2="535" y2="35" class="tufte-line" marker-end="url(#arr)"/>

    <!-- Step 3 -->
    <rect x="540" y="5" width="180" height="60" class="tufte-box" rx="4"/>
    <text x="630" y="22" text-anchor="middle" class="tufte-label">Smart Contracts</text>
    <text x="630" y="37" text-anchor="middle" class="tufte-small">실행 가능한 문서</text>
    <text x="630" y="52" text-anchor="middle" class="tufte-date">2015~</text>
  </g>

  <!-- Convergence arrow to Quarto -->
  <line x1="730" y1="135" x2="820" y2="135" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="730" y1="240" x2="820" y2="240" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="730" y1="345" x2="820" y2="345" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="820" y1="135" x2="820" y2="345" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="820" y1="240" x2="850" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Convergence box -->
  <rect x="855" y="205" width="35" height="70" fill="#f0f0f0" stroke="#555" stroke-width="1.5" rx="4"/>
  <text x="872" y="230" text-anchor="middle" class="tufte-label" font-size="10" transform="rotate(90, 872, 240)">.qmd</text>

  <!-- Bottom note -->
  <text x="450" y="420" text-anchor="middle" class="stage-label">Quarto(2022): 세 유형이 단일 .qmd에서 만나는 최초의 수렴점</text>

</svg>
