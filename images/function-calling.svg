<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <style>
      .tufte-title { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 18px; fill: #222; font-weight: bold; }
      .tufte-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 14px; fill: #333; font-weight: bold; }
      .tufte-text { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 12px; fill: #444; }
      .tufte-small { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #666; }
      .tufte-code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .box { fill: #f9f9f9; stroke: #999; stroke-width: 1; }
      .box-highlight { fill: #f0f0f0; stroke: #555; stroke-width: 1.5; }
      .box-tool { fill: #e8e8e8; stroke: #666; stroke-width: 1; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-back { stroke: #999; stroke-width: 1.5; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead-light); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead-light" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <rect width="900" height="450" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="tufte-title">Function Calling: LLM이 도구를 사용하는 방법</text>
  <text x="450" y="50" text-anchor="middle" class="tufte-small">Agent 프로그래밍의 핵심 메커니즘</text>

  <!-- Flow -->
  <g transform="translate(50, 80)">
    <!-- Step 1: User Request -->
    <rect x="0" y="0" width="180" height="70" class="box-highlight" rx="5"/>
    <text x="90" y="25" text-anchor="middle" class="tufte-text" font-weight="bold">1. 사용자 요청</text>
    <text x="90" y="45" text-anchor="middle" class="tufte-small">"서울 날씨 알려줘"</text>

    <path d="M180,35 L230,35" class="arrow"/>

    <!-- Step 2: LLM Analyzes -->
    <rect x="230" y="0" width="180" height="70" class="box" rx="5"/>
    <text x="320" y="25" text-anchor="middle" class="tufte-text" font-weight="bold">2. LLM 분석</text>
    <text x="320" y="45" text-anchor="middle" class="tufte-small">날씨 API 호출 필요</text>
    <text x="320" y="60" text-anchor="middle" class="tufte-code">get_weather("서울")</text>

    <path d="M410,35 L460,35" class="arrow"/>

    <!-- Step 3: Tool Execution -->
    <rect x="460" y="0" width="180" height="70" class="box-tool" rx="5"/>
    <text x="550" y="25" text-anchor="middle" class="tufte-text" font-weight="bold">3. 도구 실행</text>
    <text x="550" y="45" text-anchor="middle" class="tufte-small">API 호출 → 결과</text>
    <text x="550" y="60" text-anchor="middle" class="tufte-code">"맑음, 15°C"</text>

    <path d="M640,35 L690,35" class="arrow"/>

    <!-- Step 4: Final Response -->
    <rect x="690" y="0" width="180" height="70" class="box-highlight" rx="5"/>
    <text x="780" y="25" text-anchor="middle" class="tufte-text" font-weight="bold">4. 최종 응답</text>
    <text x="780" y="45" text-anchor="middle" class="tufte-small">"서울은 맑고</text>
    <text x="780" y="58" text-anchor="middle" class="tufte-small">기온 15°C입니다"</text>
  </g>

  <!-- Available Tools -->
  <g transform="translate(50, 180)">
    <text x="0" y="0" class="tufte-label">사용 가능한 도구 (예시)</text>

    <rect x="0" y="15" width="200" height="80" class="box-tool" rx="5"/>
    <text x="100" y="35" text-anchor="middle" class="tufte-text" font-weight="bold">get_weather(city)</text>
    <text x="100" y="55" text-anchor="middle" class="tufte-small">날씨 API 호출</text>
    <text x="100" y="70" text-anchor="middle" class="tufte-small">입력: 도시명</text>
    <text x="100" y="85" text-anchor="middle" class="tufte-small">출력: 날씨 정보</text>

    <rect x="220" y="15" width="200" height="80" class="box-tool" rx="5"/>
    <text x="320" y="35" text-anchor="middle" class="tufte-text" font-weight="bold">search_web(query)</text>
    <text x="320" y="55" text-anchor="middle" class="tufte-small">웹 검색</text>
    <text x="320" y="70" text-anchor="middle" class="tufte-small">입력: 검색어</text>
    <text x="320" y="85" text-anchor="middle" class="tufte-small">출력: 검색 결과</text>

    <rect x="440" y="15" width="200" height="80" class="box-tool" rx="5"/>
    <text x="540" y="35" text-anchor="middle" class="tufte-text" font-weight="bold">execute_code(code)</text>
    <text x="540" y="55" text-anchor="middle" class="tufte-small">코드 실행</text>
    <text x="540" y="70" text-anchor="middle" class="tufte-small">입력: Python 코드</text>
    <text x="540" y="85" text-anchor="middle" class="tufte-small">출력: 실행 결과</text>

    <rect x="660" y="15" width="200" height="80" class="box-tool" rx="5"/>
    <text x="760" y="35" text-anchor="middle" class="tufte-text" font-weight="bold">query_database(sql)</text>
    <text x="760" y="55" text-anchor="middle" class="tufte-small">DB 쿼리</text>
    <text x="760" y="70" text-anchor="middle" class="tufte-small">입력: SQL</text>
    <text x="760" y="85" text-anchor="middle" class="tufte-small">출력: 데이터</text>
  </g>

  <!-- Tool Schema Definition -->
  <g transform="translate(50, 290)">
    <text x="0" y="0" class="tufte-label">도구 정의 (JSON Schema)</text>

    <rect x="0" y="15" width="800" height="85" fill="#fafafa" stroke="#ccc" rx="3"/>
    <text x="10" y="35" class="tufte-code">{</text>
    <text x="20" y="50" class="tufte-code">  "name": "get_weather",</text>
    <text x="20" y="65" class="tufte-code">  "description": "특정 도시의 현재 날씨를 가져옵니다",</text>
    <text x="20" y="80" class="tufte-code">  "parameters": {"type": "object", "properties": {"city": {"type": "string"}}}</text>
    <text x="10" y="95" class="tufte-code">}</text>
  </g>

  <!-- Key Insight -->
  <text x="450" y="410" text-anchor="middle" class="tufte-text" font-style="italic" fill="#666">
    LLM은 직접 API를 호출할 수 없다. 도구 정의를 보고 "어떤 도구를 어떻게 호출할지" 결정하면, 개발자가 실제 실행
  </text>
</svg>
