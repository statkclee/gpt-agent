<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Palatino Linotype, Georgia, serif">
  <defs>
    <marker id="og-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#003876" opacity="0.5"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#FEFEFE"/>

  <!-- 슬라이드 제목이 있으므로 SVG 타이틀 생략 -->

  <!-- ═══════════════════════════════════════════ -->
  <!--  Center: 우리 조직의 문서 (이미 Lv.3)       -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="225" y="130" width="170" height="80" rx="5" fill="none" stroke="#003876" stroke-width="2"/>
  <text x="310" y="157" text-anchor="middle" font-size="14" fill="#003876" font-weight="700">우리 조직의 보고서</text>
  <text x="310" y="175" text-anchor="middle" font-size="11" fill="#555">브랜드·승인·버전관리 완료</text>
  <text x="310" y="195" text-anchor="middle" font-size="10" fill="#888">Lv.3 (조직 내 해결)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--  4 external organizations                   -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Force 1: 상급 기관 (top) -->
  <rect x="240" y="20" width="140" height="45" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="310" y="42" text-anchor="middle" font-size="11.5" fill="#555" font-weight="600">상급 기관</text>
  <text x="310" y="57" text-anchor="middle" font-size="10" fill="#888">도청 · 중앙부처 · 감사원</text>

  <!-- Arrow -->
  <line x1="310" y1="65" x2="310" y2="128" stroke="#555" stroke-width="1" opacity="0.35" marker-end="url(#og-a)"/>

  <!-- Impact label -->
  <g transform="translate(-60, 10)">
    <text x="395" y="82" font-size="10.5" fill="#555">"우리 양식에 맞춰 재제출"</text>
    <text x="395" y="96" font-size="10" fill="#888" font-style="italic">+ 포맷 변환 · 항목 추가 · 재승인</text>
  </g>

  <!-- Force 2: 협력 기관 (right) -->
  <rect x="480" y="148" width="140" height="45" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="550" y="170" text-anchor="middle" font-size="11.5" fill="#555" font-weight="600">협력 기관</text>
  <text x="550" y="185" text-anchor="middle" font-size="10" fill="#888">타 부처 · 공공기관 · 산하</text>

  <!-- Arrow -->
  <line x1="480" y1="170" x2="397" y2="170" stroke="#555" stroke-width="1" opacity="0.35" marker-end="url(#og-a)"/>

  <!-- Impact label -->
  <g transform="translate(10, 0)">
    <text x="465" y="210" font-size="10.5" fill="#555">"우리는 HWP, 너네는 Word?"</text>
    <text x="465" y="224" font-size="10" fill="#888" font-style="italic">+ 포맷 호환 · 메타데이터 손실</text>
  </g>

  <!-- Force 3: 규제·감독 (bottom) -->
  <rect x="230" y="275" width="160" height="45" rx="4" fill="none" stroke="#c0392b" stroke-width="1.2"/>
  <text x="310" y="297" text-anchor="middle" font-size="11.5" fill="#c0392b" font-weight="600">규제 · 감독 기관</text>
  <text x="310" y="312" text-anchor="middle" font-size="10" fill="#888">국세청 · 금감원 · 식약처</text>

  <!-- Arrow -->
  <line x1="310" y1="275" x2="310" y2="212" stroke="#c0392b" stroke-width="1" opacity="0.35" marker-end="url(#og-a)"/>

  <!-- Impact label -->
  <g transform="translate(-70, -20)">
    <text x="400" y="262" font-size="10.5" fill="#c0392b">"XML+PKI로 전자 제출 의무"</text>
    <text x="400" y="276" font-size="10" fill="#888" font-style="italic">+ 법정 스키마 · 전자서명 · 보존 의무</text>
  </g>

  <!-- Force 4: 국제 기구 / 해외 파트너 (left) -->
  <rect x="50" y="148" width="115" height="45" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="107" y="170" text-anchor="middle" font-size="11.5" fill="#555" font-weight="600">해외 파트너</text>
  <text x="107" y="185" text-anchor="middle" font-size="10" fill="#888">ISO · OECD · 다국적기업</text>

  <!-- Arrow -->
  <line x1="165" y1="170" x2="223" y2="170" stroke="#555" stroke-width="1" opacity="0.35" marker-end="url(#og-a)"/>

  <!-- Impact label -->
  <g transform="translate(10, 0)">
    <text x="55" y="210" font-size="10.5" fill="#555">"영문 버전도 제출"</text>
    <text x="55" y="224" font-size="10" fill="#888" font-style="italic">+ 다국어 · 국제 표준 · 시차</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--  Bottom: complexity explosion               -->
  <!-- ═══════════════════════════════════════════ -->

  <line x1="50" y1="340" x2="630" y2="340" stroke="#003876" stroke-width="0.5" opacity="0.15"/>

  <text x="55" y="362" font-size="10.5" fill="#555" letter-spacing="1.5px">조직 간 충돌 — 복잡도가 제곱으로 증가</text>

  <text x="65" y="388" font-size="12" fill="#888">조직 내</text>
  <text x="175" y="388" font-size="12" fill="#555">Lv.3 (브랜드 + 승인 + 버전관리)</text>

  <text x="65" y="412" font-size="12" fill="#c0392b" font-weight="600">조직 간</text>
  <text x="175" y="412" font-size="12" fill="#555">Lv.3 × 포맷호환 × 법정스키마 × 다국어 × 재승인 =</text>
  <text x="490" y="412" font-size="14" fill="#c0392b" font-weight="700">Lv.4++</text>

  <line x1="55" y1="432" x2="60" y2="432" stroke="#003876" stroke-width="2.5"/>
  <text x="70" y="436" font-size="12" fill="#444">조직 안에서 해결한 복잡도가, 조직 밖을 만나면 다시 폭발한다</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--  Margin notes                               -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="710" y="50" font-size="10" fill="#888" font-style="italic">조직 내 vs 조직 간:</text>
  <text x="710" y="67" font-size="10" fill="#888" font-style="italic">조직 내 = 통제 가능</text>
  <text x="710" y="82" font-size="10" fill="#888" font-style="italic">(브랜드·승인·도구 통일)</text>
  <text x="710" y="100" font-size="10" fill="#888" font-style="italic">조직 간 = 통제 불가</text>
  <text x="710" y="115" font-size="10" fill="#888" font-style="italic">(상대방 양식·법률·언어)</text>

  <text x="710" y="165" font-size="10" fill="#888" font-style="italic">전형적 사례:</text>
  <text x="710" y="182" font-size="10" fill="#888" font-style="italic">시청 보고서를 도청에</text>
  <text x="710" y="197" font-size="10" fill="#888" font-style="italic">제출 → "양식 다시 맞춰"</text>
  <text x="710" y="215" font-size="10" fill="#888" font-style="italic">국세청 제출 → "XML로"</text>
  <text x="710" y="230" font-size="10" fill="#888" font-style="italic">해외 파트너 → "영문으로"</text>

  <text x="710" y="280" font-size="10" fill="#888" font-style="italic">해법:</text>
  <text x="710" y="297" font-size="10" fill="#888" font-style="italic">단일 소스 다중 출력</text>
  <text x="710" y="312" font-size="10" fill="#888" font-style="italic">(Quarto OSMU)</text>
  <text x="710" y="330" font-size="10" fill="#888" font-style="italic">하나의 .qmd에서</text>
  <text x="710" y="345" font-size="10" fill="#888" font-style="italic">HWP·PDF·HTML·XML</text>
  <text x="710" y="360" font-size="10" fill="#888" font-style="italic">동시 생성.</text>

  <text x="710" y="405" font-size="10" fill="#888" font-style="italic">국제 표준의 역할:</text>
  <text x="710" y="422" font-size="10" fill="#888" font-style="italic">eCTD·XBRL·S1000D가</text>
  <text x="710" y="437" font-size="10" fill="#888" font-style="italic">조직 간 충돌을 해소.</text>

  <line x1="50" y1="450" x2="630" y2="450" stroke="#eee" stroke-width="0.5"/>
</svg>