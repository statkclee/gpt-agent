<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <rect width="900" height="400" fill="#fafafa" rx="4"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">재사용 vs 재생성 -- 레고와 점토</text>
  <line x1="100" y1="50" x2="800" y2="50" stroke="#999" stroke-width="0.5"/>

  <!-- Left: Reuse (Lego) -->
  <rect x="40" y="70" width="390" height="270" rx="6" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="235" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#888">재사용 (Reuse)</text>
  <text x="235" y="120" text-anchor="middle" font-size="12" fill="#aaa" font-style="italic">레고 블록 조립</text>

  <rect x="70" y="140" width="80" height="40" rx="3" fill="#bbb" stroke="#999" stroke-width="1"/>
  <text x="110" y="165" text-anchor="middle" font-size="10" fill="#fff">패턴</text>
  <rect x="160" y="140" width="80" height="40" rx="3" fill="#aaa" stroke="#999" stroke-width="1"/>
  <text x="200" y="165" text-anchor="middle" font-size="10" fill="#fff">프레임워크</text>
  <rect x="250" y="140" width="80" height="40" rx="3" fill="#999" stroke="#888" stroke-width="1"/>
  <text x="290" y="165" text-anchor="middle" font-size="10" fill="#fff">라이브러리</text>
  <rect x="340" y="140" width="70" height="40" rx="3" fill="#888" stroke="#777" stroke-width="1"/>
  <text x="375" y="165" text-anchor="middle" font-size="10" fill="#fff">SaaS</text>

  <text x="70" y="210" font-size="12" font-weight="bold" fill="#666">비용</text>
  <text x="180" y="210" font-size="11" fill="#888">초기 설계 투자 높음</text>
  <text x="70" y="232" font-size="12" font-weight="bold" fill="#666">품질</text>
  <text x="180" y="232" font-size="11" fill="#888">검증된 모듈 기반 안정성</text>
  <text x="70" y="254" font-size="12" font-weight="bold" fill="#666">속도</text>
  <text x="180" y="254" font-size="11" fill="#888">기존 모듈 조합 속도</text>
  <text x="70" y="276" font-size="12" font-weight="bold" fill="#666">유지</text>
  <text x="180" y="276" font-size="11" fill="#888">DRY 원칙, 중복 최소화</text>
  <text x="70" y="298" font-size="12" font-weight="bold" fill="#666">역할</text>
  <text x="180" y="298" font-size="11" fill="#888">코드 작성자 + 아키텍트</text>
  <text x="70" y="325" font-size="11" fill="#aaa" font-style="italic">적합: 장기 유지, 안전 필수</text>

  <!-- Divider -->
  <line x1="450" y1="70" x2="450" y2="340" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">코드 생성 비용 → 0</text>

  <!-- Right: Regeneration (Clay) -->
  <rect x="470" y="70" width="390" height="270" rx="6" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="665" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">재생성 (Regeneration)</text>
  <text x="665" y="120" text-anchor="middle" font-size="12" fill="#666" font-style="italic">점토로 빚기</text>

  <rect x="500" y="140" width="330" height="40" rx="20" fill="#555"/>
  <text x="665" y="165" text-anchor="middle" font-size="12" fill="#fff">자연어 → AI → 코드 생성 → 실행 → 폐기/재생성</text>

  <text x="500" y="210" font-size="12" font-weight="bold" fill="#444">비용</text>
  <text x="610" y="210" font-size="11" fill="#555">프롬프트 한 줄, 생성 비용 ≈ 0</text>
  <text x="500" y="232" font-size="12" font-weight="bold" fill="#444">품질</text>
  <text x="610" y="232" font-size="11" fill="#555">취약점 2.74배, 중복 1.87배</text>
  <text x="500" y="254" font-size="12" font-weight="bold" fill="#444">속도</text>
  <text x="610" y="254" font-size="11" fill="#555">80시간 → 30분 (프로토타입)</text>
  <text x="500" y="276" font-size="12" font-weight="bold" fill="#444">유지</text>
  <text x="610" y="276" font-size="11" fill="#555">유지 대신 재생성</text>
  <text x="500" y="298" font-size="12" font-weight="bold" fill="#444">역할</text>
  <text x="610" y="298" font-size="11" fill="#555">검증자 + 오케스트레이터</text>
  <text x="500" y="325" font-size="11" fill="#666" font-style="italic">적합: 프로토타입, 비핵심, 일회성</text>

  <!-- Bottom -->
  <rect x="120" y="375" width="660" height="20" rx="3" fill="#f0f0f0"/>
  <text x="450" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">이분법이 아니다 -- 상황에 따라 재사용과 재생성을 조합하는 하이브리드 전략이 최선</text>
</svg>