<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <!-- Background -->
  <rect width="900" height="440" fill="#fafafa" rx="4"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">AI의 경계선 — 바꾸는 것과 바꾸지 못하는 것</text>
  <line x1="120" y1="52" x2="780" y2="52" stroke="#999" stroke-width="0.5"/>

  <!-- Dividing line -->
  <line x1="450" y1="70" x2="450" y2="390" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="408" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">&#x2500;&#x2500;&#x2500; AI의 경계선 &#x2500;&#x2500;&#x2500;</text>

  <!-- Left: AI가 바꾸는 것 -->
  <text x="225" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#555">AI가 바꾸는 것</text>
  <text x="225" y="105" text-anchor="middle" font-size="12" fill="#888">도구 장벽 ↓</text>

  <!-- Item 1 -->
  <rect x="50" y="125" width="370" height="52" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="70" y="148" font-size="13" font-weight="bold" fill="#555">초안 생성</text>
  <text x="70" y="166" font-size="11.5" fill="#777">10분 만에 50쪽 보고서 생성 가능</text>
  <rect x="340" y="138" width="65" height="24" rx="12" fill="#ddd"/>
  <text x="372" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">50% ↓</text>

  <!-- Item 2 -->
  <rect x="50" y="187" width="370" height="52" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="70" y="210" font-size="13" font-weight="bold" fill="#555">서식·포맷팅</text>
  <text x="70" y="228" font-size="11.5" fill="#777">LaTeX/Typst 자동 생성, 스타일 적용</text>
  <rect x="340" y="200" width="65" height="24" rx="12" fill="#ddd"/>
  <text x="372" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">80% ↓</text>

  <!-- Item 3 -->
  <rect x="50" y="249" width="370" height="52" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="70" y="272" font-size="13" font-weight="bold" fill="#555">다국어 번역</text>
  <text x="70" y="290" font-size="11.5" fill="#777">DeepL, Google Translate 수준 급상승</text>
  <rect x="340" y="262" width="65" height="24" rx="12" fill="#ddd"/>
  <text x="372" y="279" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">90% ↓</text>

  <!-- Item 4 -->
  <rect x="50" y="311" width="370" height="52" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="70" y="334" font-size="13" font-weight="bold" fill="#555">정보 검색·요약</text>
  <text x="70" y="352" font-size="11.5" fill="#777">지식 노동자 탐색 시간 20% → 대폭 단축</text>
  <rect x="340" y="324" width="65" height="24" rx="12" fill="#ddd"/>
  <text x="372" y="341" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">70% ↓</text>

  <!-- Right: AI가 못 바꾸는 것 -->
  <text x="675" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">AI가 바꾸지 못하는 것</text>
  <text x="675" y="105" text-anchor="middle" font-size="12" fill="#888">지배 차원 불변</text>

  <!-- Item 1 -->
  <rect x="480" y="125" width="370" height="52" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="500" y="148" font-size="13" font-weight="bold" fill="#333">복잡도 판단</text>
  <text x="500" y="166" font-size="11.5" fill="#555">"이 문서가 Lv 몇인가?" — 맥락 이해 필요</text>

  <!-- Item 2 -->
  <rect x="480" y="187" width="370" height="52" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="500" y="210" font-size="13" font-weight="bold" fill="#333">법적 책임</text>
  <text x="500" y="228" font-size="11.5" fill="#555">규제 준수 3~7년 보존, 인간 승인 필수</text>

  <!-- Item 3 -->
  <rect x="480" y="249" width="370" height="52" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="500" y="272" font-size="13" font-weight="bold" fill="#333">사실 검증</text>
  <text x="500" y="290" font-size="11.5" fill="#555">환각 인용 2.6%, 문서당 추가 검증 시간 필요</text>

  <!-- Item 4 -->
  <rect x="480" y="311" width="370" height="52" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="500" y="334" font-size="13" font-weight="bold" fill="#333">조직 기억</text>
  <text x="500" y="352" font-size="11.5" fill="#555">LLM 메모리 = 세션 한정, 영속적 저장 불가</text>

  <!-- Bottom insight -->
  <rect x="120" y="398" width="660" height="30" rx="3" fill="#f0f0f0"/>
  <text x="450" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">AI는 "쓰는 비용"을 낮추지만, "쓸 가치가 있는가"의 판단은 인간의 몫이다</text>
</svg>