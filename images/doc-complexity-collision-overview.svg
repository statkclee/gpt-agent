<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Palatino Linotype, Georgia, serif">
  <defs>
    <marker id="ov-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#003876" opacity="0.5"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#FEFEFE"/>

  <!-- 슬라이드 제목이 있으므로 SVG 타이틀 생략 -->

  <!-- ═══════════════════════════════════════════ -->
  <!--  4 concentric layers (inside → outside)     -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Layer 4: 글로벌 (outermost) -->
  <rect x="45" y="30" width="575" height="340" rx="8" fill="none" stroke="#003876" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.2"/>
  <text x="55" y="50" font-size="11" fill="#003876" font-weight="600">글로벌</text>
  <text x="55" y="64" font-size="9.5" fill="#888">ISO · GDPR · S1000D · 다국어</text>

  <!-- Layer 3: 조직 간 -->
  <rect x="75" y="78" width="500" height="250" rx="6" fill="none" stroke="#003876" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.25"/>
  <text x="85" y="96" font-size="11" fill="#003876" font-weight="600">조직 간</text>
  <text x="85" y="110" font-size="9.5" fill="#888">상급 기관 · 규제 · 해외 파트너</text>

  <!-- Layer 2: 조직 내 -->
  <rect x="110" y="122" width="430" height="165" rx="5" fill="none" stroke="#003876" stroke-width="1" opacity="0.3"/>
  <text x="120" y="140" font-size="11" fill="#003876" font-weight="600">조직 내</text>
  <text x="120" y="154" font-size="9.5" fill="#888">다른 개인 · 부서 · 승인</text>

  <!-- Layer 1: 개인 (innermost) -->
  <rect x="200" y="165" width="210" height="65" rx="4" fill="none" stroke="#003876" stroke-width="1.5"/>
  <text x="305" y="192" text-anchor="middle" font-size="14" fill="#003876" font-weight="700">김대리 보고서</text>
  <text x="305" y="210" text-anchor="middle" font-size="11" fill="#555">Lv.0 → Lv.2 (개인 복잡도)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--  Right: complexity multiplication           -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Multiplication labels — 선 위에 텍스트, 선 아래에 결과 -->
  <text x="430" y="192" font-size="12" fill="#003876" font-weight="600">Lv.2</text>

  <text x="445" y="148" font-size="11" fill="#555">× 서식·승인·규제</text>
  <text x="445" y="163" font-size="12" fill="#003876" font-weight="600">= Lv.4+</text>
  <line x1="430" y1="170" x2="430" y2="150" stroke="#003876" stroke-width="0.8" opacity="0.2"/>

  <text x="485" y="100" font-size="11" fill="#555">× 포맷·스키마·다기관</text>
  <text x="485" y="115" font-size="12" fill="#003876" font-weight="600">= Lv.4++</text>
  <line x1="470" y1="122" x2="470" y2="102" stroke="#003876" stroke-width="0.8" opacity="0.2"/>

  <text x="515" y="53" font-size="11" fill="#555">× 관할권·표준·다국어</text>
  <text x="515" y="68" font-size="12" fill="#c0392b" font-weight="700">= Lv.∞</text>
  <line x1="500" y1="75" x2="500" y2="55" stroke="#003876" stroke-width="0.8" opacity="0.2"/>

  <!-- ═══════════════════════════════════════════ -->
  <!--  Bottom: key insight                        -->
  <!-- ═══════════════════════════════════════════ -->

  <line x1="50" y1="390" x2="630" y2="390" stroke="#003876" stroke-width="0.5" opacity="0.15"/>

  <line x1="55" y1="413" x2="60" y2="413" stroke="#003876" stroke-width="2.5"/>
  <text x="70" y="417" font-size="12.5" fill="#444">각 경계를 넘을 때마다 복잡도는 덧셈이 아니라 곱셈으로 증가한다</text>

  <line x1="55" y1="438" x2="60" y2="438" stroke="#003876" stroke-width="2.5"/>
  <text x="70" y="442" font-size="12.5" fill="#444">해법: 단일 소스(Quarto) + 국제 표준(XML) + 버전 관리(Git) = 모든 경계 통과</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--  Margin notes                               -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="710" y="50" font-size="10" fill="#888" font-style="italic">4단계 복잡도 충돌:</text>

  <text x="710" y="80" font-size="10" fill="#888" font-style="italic">① 개인</text>
  <text x="710" y="95" font-size="10" fill="#888" font-style="italic">Lv.0→2: 독자·수명·재현</text>
  <text x="710" y="110" font-size="10" fill="#888" font-style="italic">덧셈으로 증가</text>

  <text x="710" y="140" font-size="10" fill="#888" font-style="italic">② 조직 내</text>
  <text x="710" y="155" font-size="10" fill="#888" font-style="italic">× 서식·승인·브랜드</text>
  <text x="710" y="170" font-size="10" fill="#888" font-style="italic">곱셈 시작</text>

  <text x="710" y="200" font-size="10" fill="#888" font-style="italic">③ 조직 간</text>
  <text x="710" y="215" font-size="10" fill="#888" font-style="italic">× 포맷 호환·법정 스키마</text>
  <text x="710" y="230" font-size="10" fill="#888" font-style="italic">통제 불가 영역 진입</text>

  <text x="710" y="260" font-size="10" fill="#888" font-style="italic">④ 글로벌</text>
  <text x="710" y="275" font-size="10" fill="#888" font-style="italic">× 관할권·표준·다국어</text>
  <text x="710" y="290" font-size="10" fill="#888" font-style="italic">국가 표준으로 해결 불가</text>

  <text x="710" y="330" font-size="10" fill="#888" font-style="italic">공통 해법:</text>
  <text x="710" y="347" font-size="10" fill="#888" font-style="italic">Quarto OSMU</text>
  <text x="710" y="362" font-size="10" fill="#888" font-style="italic">= 단일 소스 → N 포맷</text>
  <text x="710" y="380" font-size="10" fill="#888" font-style="italic">+ 국제 표준(XML)</text>
  <text x="710" y="395" font-size="10" fill="#888" font-style="italic">+ Git 버전 관리</text>
  <text x="710" y="413" font-size="10" fill="#888" font-style="italic">→ 4단계 모든 경계를</text>
  <text x="710" y="428" font-size="10" fill="#888" font-style="italic">하나의 도구로 통과.</text>
</svg>