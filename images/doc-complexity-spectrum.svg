<svg viewBox="0 0 920 400" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans KR',Arial,sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0d1e3a"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a0c8e8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0a1e3c;stop-opacity:0.95"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0a1e3c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="400" fill="#f8f9fa"/>

  <!-- Header -->
  <rect width="920" height="44" fill="url(#headerGrad)" rx="3"/>
  <rect y="40" width="920" height="4" fill="#0d1e3a"/>
  <text x="460" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="white">문서 복잡도 스펙트럼 — 5단계</text>
  <text x="460" y="37" text-anchor="middle" font-size="9.5" fill="#90b8d8">메모에서 자동화 파이프라인까지 — 복잡도에 맞는 도구를 선택하는 것이 글쓰기 리터러시다</text>

  <!-- Arrow gradient bar -->
  <rect x="10" y="52" width="892" height="16" fill="url(#arrowGrad)" rx="8"/>
  <text x="18" y="64" font-size="9" fill="white" font-weight="bold">◀ 단순</text>
  <text x="900" y="64" font-size="9" fill="white" font-weight="bold" text-anchor="end">복잡 ▶</text>

  <!-- ===== LEVEL 0 ===== -->
  <rect x="10" y="76" width="172" height="290" fill="#e8f4fd" rx="6" stroke="#a0c8e0" stroke-width="1.2"/>
  <circle cx="96" cy="102" r="20" fill="#7ab0d8"/>
  <text x="96" y="97" text-anchor="middle" font-size="8.5" font-weight="bold" fill="white">Lv.0</text>
  <text x="96" y="112" text-anchor="middle" font-size="8" fill="white">단순</text>
  <text x="96" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a5c">메모 · 이메일</text>
  <line x1="22" y1="143" x2="170" y2="143" stroke="#b0d0e8" stroke-width="0.8"/>
  <text x="96" y="161" text-anchor="middle" font-size="9" fill="#2a4a6c">카카오톡 메시지</text>
  <text x="96" y="177" text-anchor="middle" font-size="9" fill="#2a4a6c">이메일 · 메모장</text>
  <text x="96" y="193" text-anchor="middle" font-size="9" fill="#2a4a6c">SNS 포스트</text>
  <text x="96" y="209" text-anchor="middle" font-size="9" fill="#2a4a6c">개인 일기</text>
  <line x1="22" y1="322" x2="170" y2="322" stroke="#b0d0e8" stroke-width="0.8"/>
  <rect x="22" y="328" width="148" height="30" fill="#7ab0d8" rx="4"/>
  <text x="96" y="340" text-anchor="middle" font-size="8" font-weight="bold" fill="white">권장 도구</text>
  <text x="96" y="352" text-anchor="middle" font-size="8" fill="white">메모앱 · 카카오톡</text>

  <!-- ===== LEVEL 1 ===== -->
  <rect x="192" y="76" width="172" height="290" fill="#c8dff8" rx="6" stroke="#80b0d8" stroke-width="1.2"/>
  <circle cx="278" cy="102" r="20" fill="#5090c8"/>
  <text x="278" y="97" text-anchor="middle" font-size="8.5" font-weight="bold" fill="white">Lv.1</text>
  <text x="278" y="112" text-anchor="middle" font-size="8" fill="white">기본</text>
  <text x="278" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a5c">보고서 · 제안서</text>
  <line x1="204" y1="143" x2="352" y2="143" stroke="#90c0e0" stroke-width="0.8"/>
