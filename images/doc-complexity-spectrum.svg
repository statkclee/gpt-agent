  <line x1="386" y1="322" x2="534" y2="322" stroke="#6090b8" stroke-width="0.8"/>
  <rect x="386" y="328" width="148" height="30" fill="#2a60a0" rx="4"/>
  <text x="460" y="340" text-anchor="middle" font-size="8" font-weight="bold" fill="white">권장 도구</text>
  <text x="460" y="352" text-anchor="middle" font-size="8" fill="white">LaTeX · Markdown · Quarto</text>

  <!-- ===== LEVEL 3 ===== -->
  <rect x="556" y="76" width="172" height="290" fill="#1e4878" rx="6" stroke="#0e3060" stroke-width="1.2"/>
  <circle cx="642" cy="102" r="20" fill="#0e3060"/>
  <text x="642" y="97" text-anchor="middle" font-size="8.5" font-weight="bold" fill="white">Lv.3</text>
  <text x="642" y="112" text-anchor="middle" font-size="8" fill="#90c0e8">고급</text>
  <text x="642" y="132" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">데이터 분석 보고서</text>
  <line x1="568" y1="143" x2="716" y2="143" stroke="#4070a0" stroke-width="0.8"/>
  <text x="642" y="161" text-anchor="middle" font-size="9" fill="#b0d0f0">재현 가능 연구</text>
  <text x="642" y="177" text-anchor="middle" font-size="9" fill="#b0d0f0">코드 + 결과 통합</text>
  <text x="642" y="193" text-anchor="middle" font-size="9" fill="#b0d0f0">Jupyter Notebook</text>
  <text x="642" y="209" text-anchor="middle" font-size="9" fill="#b0d0f0">대화형 시각화</text>
  <line x1="568" y1="322" x2="716" y2="322" stroke="#4070a0" stroke-width="0.8"/>
  <rect x="568" y="328" width="148" height="30" fill="#0e3060" rx="4"/>
  <text x="642" y="340" text-anchor="middle" font-size="8" font-weight="bold" fill="white">권장 도구</text>
  <text x="642" y="352" text-anchor="middle" font-size="8" fill="#a0c8e8">Quarto + R / Python</text>

  <!-- ===== LEVEL 4 ===== -->
  <rect x="738" y="76" width="172" height="290" fill="#091828" rx="6" stroke="#040c18" stroke-width="1.2"/>
  <circle cx="824" cy="102" r="20" fill="#040c18"/>
  <text x="824" y="97" text-anchor="middle" font-size="8.5" font-weight="bold" fill="white">Lv.4</text>
  <text x="824" y="112" text-anchor="middle" font-size="8" fill="#6090c0">전문가</text>
  <text x="824" y="132" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">자동화 파이프라인</text>
  <line x1="750" y1="143" x2="898" y2="143" stroke="#304060" stroke-width="0.8"/>
  <text x="824" y="161" text-anchor="middle" font-size="9" fill="#90b8d8">CI/CD 자동 빌드</text>
  <text x="824" y="177" text-anchor="middle" font-size="9" fill="#90b8d8">정기 보고서 자동화</text>
  <text x="824" y="193" text-anchor="middle" font-size="9" fill="#90b8d8">실시간 대시보드</text>
  <text x="824" y="209" text-anchor="middle" font-size="9" fill="#90b8d8">API 연동 문서</text>
  <line x1="750" y1="322" x2="898" y2="322" stroke="#304060" stroke-width="0.8"/>
  <rect x="750" y="328" width="148" height="30" fill="#040c18" rx="4"/>
  <text x="824" y="340" text-anchor="middle" font-size="8" font-weight="bold" fill="white">권장 도구</text>
  <text x="824" y="352" text-anchor="middle" font-size="8" fill="#90b8d8">Quarto + GitHub Actions</text>

  <!-- Bottom insight strip -->
  <rect x="0" y="376" width="920" height="24" fill="#1a3a5c" opacity="0.9"/>
  <text x="460" y="392" text-anchor="middle" font-size="9" fill="white">핵심: Lv.1 문서에 LaTeX(과잉) · Lv.4 문서에 Word(과소) → AI 시대: 복잡도 장벽이 낮아지고 Lv.3-4에 집중해야 한다</text>
</svg>
