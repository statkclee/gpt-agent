  <text x="278" y="177" text-anchor="middle" font-size="9" fill="#1a3a5c">기획서 · 제안서</text>
  <text x="278" y="193" text-anchor="middle" font-size="9" fill="#1a3a5c">회의록 · 의사록</text>
  <text x="278" y="209" text-anchor="middle" font-size="9" fill="#1a3a5c">행정 공문</text>
  <line x1="204" y1="322" x2="352" y2="322" stroke="#90c0e0" stroke-width="0.8"/>
  <rect x="204" y="328" width="148" height="30" fill="#5090c8" rx="4"/>
  <text x="278" y="340" text-anchor="middle" font-size="8" font-weight="bold" fill="white">권장 도구</text>
  <text x="278" y="352" text-anchor="middle" font-size="8" fill="white">Word · HWP · Google Docs</text>

  <!-- ===== LEVEL 2 ===== -->
  <rect x="374" y="76" width="172" height="290" fill="#4a84c0" rx="6" stroke="#3070a0" stroke-width="1.2"/>
  <circle cx="460" cy="102" r="20" fill="#2a60a0"/>
  <text x="460" y="97" text-anchor="middle" font-size="8.5" font-weight="bold" fill="white">Lv.2</text>
  <text x="460" y="112" text-anchor="middle" font-size="8" fill="#d0e8f8">중급</text>
  <text x="460" y="132" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">학술논문 · 기술문서</text>
  <line x1="386" y1="143" x2="534" y2="143" stroke="#6090b8" stroke-width="0.8"/>
  <text x="460" y="161" text-anchor="middle" font-size="9" fill="#deeef8">학술 논문 · 리뷰</text>
  <text x="460" y="177" text-anchor="middle" font-size="9" fill="#deeef8">기술 매뉴얼</text>
  <text x="460" y="193" text-anchor="middle" font-size="9" fill="#deeef8">교재 · 강의자료</text>
