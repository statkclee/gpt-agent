<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs>
    <style>
      .tufte-text {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #333;
      }
      .tufte-label {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #666;
        font-size: 13px;
      }
      .tufte-title {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #333;
        font-size: 16px;
        font-weight: bold;
      }
      .tufte-small {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #666;
        font-size: 11px;
      }
      .tufte-code {
        font-family: 'Monaco', 'Courier New', monospace;
        fill: #333;
        font-size: 11px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="650" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="30" class="tufte-title" text-anchor="middle">Zed 인터페이스 구조</text>

  <!-- Main Container -->
  <rect x="50" y="60" width="900" height="550" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>

  <!-- Top Menu Bar -->
  <rect x="50" y="60" width="900" height="35" fill="#e5e5e5" stroke="#999" stroke-width="1"/>
  <text x="70" y="82" class="tufte-label">File</text>
  <text x="120" y="82" class="tufte-label">Edit</text>
  <text x="170" y="82" class="tufte-label">View</text>
  <text x="230" y="82" class="tufte-label">Go</text>

  <!-- Collaboration indicator -->
  <circle cx="880" cy="77" r="6" fill="#666"/>
  <circle cx="900" cy="77" r="6" fill="#999"/>
  <text x="760" y="82" class="tufte-small">Collaboration Active</text>

  <!-- Left Sidebar - File Tree -->
  <rect x="50" y="95" width="200" height="515" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="115" class="tufte-label" font-weight="bold">PROJECT</text>

  <!-- File tree structure -->
  <text x="65" y="140" class="tufte-small">▼ src/</text>
  <text x="80" y="160" class="tufte-small">▼ components/</text>
  <text x="95" y="180" class="tufte-small">UserProfile.tsx</text>
  <text x="95" y="200" class="tufte-small">Header.tsx</text>
  <text x="80" y="220" class="tufte-small">▶ utils/</text>
  <text x="80" y="240" class="tufte-small">main.tsx</text>
  <text x="65" y="260" class="tufte-small">▼ tests/</text>
  <text x="80" y="280" class="tufte-small">UserProfile.test.tsx</text>
  <text x="65" y="300" class="tufte-small">package.json</text>
  <text x="65" y="320" class="tufte-small">README.md</text>

  <!-- Main Editor Area -->
  <rect x="250" y="95" width="480" height="380" fill="#ffffff" stroke="#ccc" stroke-width="1"/>

  <!-- Editor Tab -->
  <rect x="250" y="95" width="150" height="30" fill="#e5e5e5" stroke="#999" stroke-width="1"/>
  <text x="260" y="115" class="tufte-small">UserProfile.tsx</text>
  <text x="385" y="115" class="tufte-small">×</text>

  <!-- Code Content -->
  <text x="260" y="145" class="tufte-code">interface UserProfileProps {</text>
  <text x="260" y="165" class="tufte-code">  name: string;</text>
  <text x="260" y="185" class="tufte-code">  email: string;</text>
  <text x="260" y="205" class="tufte-code">  avatarUrl: string;</text>
  <text x="260" y="225" class="tufte-code">}</text>
  <text x="260" y="255" class="tufte-code">export function UserProfile({</text>
  <text x="260" y="275" class="tufte-code">  name, email, avatarUrl</text>
  <text x="260" y="295" class="tufte-code">}: UserProfileProps) {</text>
  <text x="260" y="315" class="tufte-code">  return (</text>
  <text x="260" y="335" class="tufte-code">    &lt;div className="profile"&gt;</text>

  <!-- Cursor indicators (collaboration) -->
  <rect x="380" y="267" width="2" height="16" fill="#666"/>
  <text x="385" y="278" class="tufte-small" fill="#666">Alice</text>

  <!-- Right Sidebar - AI Assistant -->
  <rect x="730" y="95" width="220" height="380" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="740" y="115" class="tufte-label" font-weight="bold">AI ASSISTANT</text>

  <!-- AI icon -->
  <circle cx="915" cy="110" r="8" fill="none" stroke="#666" stroke-width="1.5"/>
  <path d="M 909 110 L 921 110 M 915 104 L 915 116" stroke="#666" stroke-width="1.5" fill="none"/>

  <!-- Chat messages -->
  <rect x="740" y="130" width="200" height="60" fill="#ffffff" stroke="#ccc" stroke-width="0.5" rx="4"/>
  <text x="750" y="148" class="tufte-small" fill="#333">You:</text>
  <text x="750" y="165" class="tufte-small" fill="#666">Refactor this component</text>
  <text x="750" y="180" class="tufte-small" fill="#666">to use TypeScript generics</text>

  <rect x="740" y="200" width="200" height="100" fill="#e5e5e5" stroke="#999" stroke-width="0.5" rx="4"/>
  <text x="750" y="218" class="tufte-small" fill="#333">AI:</text>
  <text x="750" y="235" class="tufte-small" fill="#666">I can help refactor this</text>
  <text x="750" y="250" class="tufte-small" fill="#666">component. Here's a version</text>
  <text x="750" y="265" class="tufte-small" fill="#666">using generics for better</text>
  <text x="750" y="280" class="tufte-small" fill="#666">type safety...</text>

  <!-- Action buttons -->
  <rect x="740" y="310" width="95" height="25" fill="none" stroke="#666" stroke-width="1" rx="3"/>
  <text x="767" y="327" class="tufte-small" fill="#666">Apply</text>

  <rect x="845" y="310" width="95" height="25" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="865" y="327" class="tufte-small" fill="#999">Discard</text>

  <!-- Bottom Panel - Terminal -->
  <rect x="250" y="475" width="700" height="135" fill="#333" stroke="#666" stroke-width="1"/>

  <!-- Terminal Tab -->
  <rect x="250" y="475" width="100" height="25" fill="#4a4a4a" stroke="#666" stroke-width="1"/>
  <text x="265" y="492" class="tufte-small" fill="#ccc">TERMINAL</text>

  <!-- Terminal content -->
  <text x="260" y="515" class="tufte-code" fill="#ccc">$ npm run dev</text>
  <text x="260" y="535" class="tufte-code" fill="#999">&gt; vite</text>
  <text x="260" y="555" class="tufte-code" fill="#999">VITE v5.0.0  ready in 234 ms</text>
  <text x="260" y="575" class="tufte-code" fill="#999">➜  Local:   http://localhost:5173/</text>
  <text x="260" y="595" class="tufte-code" fill="#ccc">_</text>

  <!-- Status Bar -->
  <rect x="50" y="610" width="900" height="25" fill="#e5e5e5" stroke="#999" stroke-width="1"/>
  <text x="60" y="627" class="tufte-small">main ✓</text>
  <text x="130" y="627" class="tufte-small">TypeScript</text>
  <text x="230" y="627" class="tufte-small">UTF-8</text>
  <text x="820" y="627" class="tufte-small">Ln 12, Col 28</text>

  <!-- Annotations -->
  <line x1="150" y1="200" x2="200" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="155" y="195" class="tufte-small" fill="#666">파일 탐색기</text>

  <line x1="490" y1="520" x2="540" y2="520" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="420" y="545" class="tufte-small" fill="#999">통합 터미널</text>

  <line x1="840" y1="240" x2="790" y2="240" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="850" y="245" class="tufte-small" fill="#666">AI 어시스턴트</text>

  <line x1="385" y1="275" x2="430" y2="260" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="435" y="263" class="tufte-small" fill="#666">협업 커서</text>
</svg>
