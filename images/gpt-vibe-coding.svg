<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 70 800 320">
  <defs>
    <style>
      .tufte-title { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 22px; fill: #111; font-weight: bold; }
      .tufte-subtitle { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 15px; fill: #555; }
      .tufte-header { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 16px; fill: #111; font-weight: bold; }
      .tufte-label { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 14px; fill: #222; font-weight: bold; }
      .tufte-text { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 13px; fill: #333; }
      .tufte-desc { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 12px; fill: #555; font-style: italic; }
      .tufte-small { font-family: Palatino, 'Book Antiqua', Georgia, serif; font-size: 11px; fill: #666; }
      .tufte-box { fill: #fdfdfd; stroke: #999; stroke-width: 1; }
      .tufte-box-highlight { fill: #f4f4f4; stroke: #444; stroke-width: 1.5; }
      .tufte-line { stroke: #888; stroke-width: 1; }
      .tufte-arrow { fill: #888; }
      
      /* Process Flow Styles */
      .step-box { fill: #fff; stroke: #888; stroke-width: 1; }
      .step-box-active { fill: #333; stroke: #333; stroke-width: 1; }
      .step-text { font-family: Palatino, serif; font-size: 12px; fill: #333; text-anchor: middle; }
      .step-text-active { font-family: Palatino, serif; font-size: 12px; fill: #fff; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="tufte-arrow"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="450" fill="#ffffff"/>

  <!-- Title -->
  <!-- <text x="400" y="40" text-anchor="middle" class="tufte-title">Vibe Coding: 구현을 넘어 의도로</text>
  <text x="400" y="65" text-anchor="middle" class="tufte-subtitle">"코드가 존재한다는 사실조차 잊어라" — Andrej Karpathy</text> -->

  <!-- Main Comparison Area -->
  <g transform="translate(0, 90)">

    <!-- Top: Traditional Coding (Detailed & Slow) -->
    <g transform="translate(50, 0)">
      <text x="100" y="20" class="tufte-label">전통적 개발 방식</text>
      <text x="100" y="40" class="tufte-small" fill="#666">개발자가 모든 단계를 직접 수행</text>
      
      <!-- Flow -->
      <g transform="translate(20, 60)">
        <!-- Step 1 -->
        <rect x="0" y="0" width="80" height="40" class="step-box" rx="3"/>
        <text x="40" y="25" class="step-text">설계</text>
        <line x1="80" y1="20" x2="100" y2="20" class="tufte-line" marker-end="url(#arrowhead)"/>
        
        <!-- Step 2 -->
        <rect x="100" y="0" width="80" height="40" class="step-box-active" rx="3"/> <!-- Highlight: Coding is the bottleneck -->
        <text x="140" y="25" class="step-text-active">코딩</text>
        <line x1="180" y1="20" x2="200" y2="20" class="tufte-line" marker-end="url(#arrowhead)"/>

        <!-- Step 3 -->
        <rect x="200" y="0" width="80" height="40" class="step-box" rx="3"/>
        <text x="240" y="25" class="step-text">디버깅</text>
        <line x1="280" y1="20" x2="300" y2="20" class="tufte-line" marker-end="url(#arrowhead)"/>

        <!-- Step 4 -->
        <rect x="300" y="0" width="80" height="40" class="step-box" rx="3"/>
        <text x="340" y="25" class="step-text">배포</text>
      </g>
      
      <text x="210" y="130" text-anchor="middle" class="tufte-desc">"어떻게 구현할까(How)에 집중"</text>
    </g>

    <!-- Bottom: Vibe Coding (Fast & Intent-Driven) -->
    <g transform="translate(50, 160)">
      <text x="100" y="10" class="tufte-label">Vibe Coding</text>
      <text x="100" y="30" class="tufte-small" fill="#666">AI에게 위임하고 결과만 확인</text>
      
      <!-- Flow -->
      <g transform="translate(20, 50)">
        <!-- Step 1: Intent -->
        <rect x="0" y="0" width="120" height="50" class="step-box-active" rx="3"/>
        <text x="60" y="20" class="step-text-active" font-size="13">의도(Intent)</text>
        <text x="60" y="38" class="step-text-active" font-size="10" font-weight="normal">자연어 명세</text>
        
        <!-- Fast Arrow -->
        <line x1="120" y1="25" x2="260" y2="25" class="tufte-line" stroke-width="2" marker-end="url(#arrowhead)"/>
        <text x="190" y="20" text-anchor="middle" class="tufte-small">AI 즉시 생성</text>

        <!-- Step 2: Verification -->
        <rect x="260" y="0" width="120" height="50" class="step-box" rx="3" stroke="#333" stroke-width="1.5"/>
        <text x="320" y="20" class="step-text" font-weight="bold">검증</text>
        <text x="320" y="38" class="step-text" font-size="10">실행 &amp; 확인</text>
      </g>

      <text x="210" y="120" text-anchor="middle" class="tufte-desc">"무엇을 만들까(What)에 집중"</text>
    </g>

    <!-- Right: Key Insight Box -->
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="260" height="280" class="tufte-box-highlight" rx="4"/>
      <text x="130" y="30" text-anchor="middle" class="tufte-header">Vibe Coding 원칙</text>
      <line x1="20" y1="45" x2="240" y2="45" class="tufte-line" stroke-width="0.5"/>

      <g transform="translate(20, 75)">
        <text x="0" y="0" class="tufte-label">1. 코드는 부채다</text>
        <text x="0" y="20" class="tufte-small">자산이 아니라 부채(Liability).</text>
        <text x="0" y="35" class="tufte-small">직접 작성 말고 생성하라.</text>

        <text x="0" y="65" class="tufte-label">2. 일회용 코드</text>
        <text x="0" y="85" class="tufte-small">재사용하려 애쓰지 마라.</text>
        <text x="0" y="100" class="tufte-small">필요할 때 다시 생성하면 된다.</text>

        <text x="0" y="130" class="tufte-label">3. 검증자로 전환</text>
        <text x="0" y="150" class="tufte-small">작성자(Writer)에서</text>
        <text x="0" y="165" class="tufte-small">검증자(Verifier)로 역할 이동.</text>
      </g>
    </g>
  </g>

  <!-- Bottom Statistics/Footer -->
  <!-- <line x1="50" y1="370" x2="750" y2="370" class="tufte-line" stroke-width="0.5"/>
  <text x="400" y="400" text-anchor="middle" class="tufte-label">현실 점검 (2025)</text>
  <text x="200" y="430" text-anchor="middle" class="tufte-small">YC 스타트업 25%가 AI 생성 코드베이스 보유</text>
  <text x="600" y="430" text-anchor="middle" class="tufte-small">단, AI 코드의 45%는 보안 취약점 포함 (검증 필수)</text> -->

</svg>