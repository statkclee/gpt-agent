<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#fafafa" rx="4"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">문서의 4대 본질 기능 — AI로 대체할 수 없는 것</text>
  <line x1="120" y1="52" x2="780" y2="52" stroke="#999" stroke-width="0.5"/>

  <!-- Pillar 1: 지식 보존 -->
  <rect x="40" y="75" width="190" height="340" rx="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="40" y="75" width="190" height="45" rx="4" fill="#444"/>
  <text x="135" y="103" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">지식 보존</text>

  <text x="55" y="145" font-size="11.5" fill="#555">조직의 집합적 지식,</text>
  <text x="55" y="163" font-size="11.5" fill="#555">경험, 노하우를 축적</text>

  <line x1="65" y1="180" x2="205" y2="180" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="200" font-size="11" font-weight="bold" fill="#666">AI 한계:</text>
  <text x="55" y="220" font-size="11" fill="#777">LLM 세션 종료 시</text>
  <text x="55" y="238" font-size="11" fill="#777">모든 맥락 소실</text>
  <text x="55" y="256" font-size="11" fill="#777">"당신은 존재하지</text>
  <text x="55" y="274" font-size="11" fill="#777"> 않았다"</text>

  <line x1="65" y1="290" x2="205" y2="290" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="310" font-size="11" font-weight="bold" fill="#666">비용:</text>
  <text x="55" y="330" font-size="11" fill="#777">지식 손실 →</text>
  <text x="55" y="348" font-size="11" fill="#777">온보딩 비용 증가</text>
  <text x="55" y="366" font-size="11" fill="#777">혁신 역량 저하</text>
  <text x="55" y="384" font-size="11" fill="#777">의사결정 일관성 ↓</text>

  <!-- Pillar 2: 법적 증빙 -->
  <rect x="260" y="75" width="190" height="340" rx="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="260" y="75" width="190" height="45" rx="4" fill="#555"/>
  <text x="355" y="103" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">법적 증빙</text>

  <text x="275" y="145" font-size="11.5" fill="#555">감사 추적, 규제 준수,</text>
  <text x="275" y="163" font-size="11.5" fill="#555">계약 이행의 증거</text>

  <line x1="285" y1="180" x2="425" y2="180" stroke="#ddd" stroke-width="0.5"/>
  <text x="275" y="200" font-size="11" font-weight="bold" fill="#666">AI 한계:</text>
  <text x="275" y="220" font-size="11" fill="#777">AI 생성물 =</text>
  <text x="275" y="238" font-size="11" fill="#777">법적 증거력 없음</text>
  <text x="275" y="256" font-size="11" fill="#777">변조 불가능한</text>
  <text x="275" y="274" font-size="11" fill="#777">시스템 기록 필수</text>

  <line x1="285" y1="290" x2="425" y2="290" stroke="#ddd" stroke-width="0.5"/>
  <text x="275" y="310" font-size="11" font-weight="bold" fill="#666">규제:</text>
  <text x="275" y="330" font-size="11" fill="#777">EU AI Act</text>
  <text x="275" y="348" font-size="11" fill="#777">NIST RMF</text>
  <text x="275" y="366" font-size="11" fill="#777">ISO/IEC 42001</text>
  <text x="275" y="384" font-size="11" fill="#777">3~7년 보존 의무</text>

  <!-- Pillar 3: 재현성 -->
  <rect x="480" y="75" width="190" height="340" rx="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="480" y="75" width="190" height="45" rx="4" fill="#666"/>
  <text x="575" y="103" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">재현성</text>

  <text x="495" y="145" font-size="11.5" fill="#555">동일 조건에서 동일</text>
  <text x="495" y="163" font-size="11.5" fill="#555">결과를 얻을 수 있는 능력</text>

  <line x1="505" y1="180" x2="645" y2="180" stroke="#ddd" stroke-width="0.5"/>
  <text x="495" y="200" font-size="11" font-weight="bold" fill="#666">AI 한계:</text>
  <text x="495" y="220" font-size="11" fill="#777">AI + ML 연구의</text>
  <text x="495" y="238" font-size="11" fill="#777">70%가 재현 불가</text>
  <text x="495" y="256" font-size="11" fill="#777">환각 인용 2.6%</text>
  <text x="495" y="274" font-size="11" fill="#777">(2024년의 9배)</text>

  <line x1="505" y1="290" x2="645" y2="290" stroke="#ddd" stroke-width="0.5"/>
  <text x="495" y="310" font-size="11" font-weight="bold" fill="#666">필요:</text>
  <text x="495" y="330" font-size="11" fill="#777">코드+데이터 동봉</text>
  <text x="495" y="348" font-size="11" fill="#777">출처 추적 인프라</text>
  <text x="495" y="366" font-size="11" fill="#777">투명한 방법론</text>
  <text x="495" y="384" font-size="11" fill="#777">(TOM 프레임워크)</text>

  <!-- Pillar 4: 책임 소재 -->
  <rect x="700" y="75" width="165" height="340" rx="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="700" y="75" width="165" height="45" rx="4" fill="#777"/>
  <text x="782" y="103" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">책임 소재</text>

  <text x="715" y="145" font-size="11.5" fill="#555">누가, 언제, 무엇을</text>
  <text x="715" y="163" font-size="11.5" fill="#555">결정했는지 추적</text>

  <line x1="725" y1="180" x2="840" y2="180" stroke="#ddd" stroke-width="0.5"/>
  <text x="715" y="200" font-size="11" font-weight="bold" fill="#666">AI 한계:</text>
  <text x="715" y="220" font-size="11" fill="#777">"정책이 있다" ≠</text>
  <text x="715" y="238" font-size="11" fill="#777">"준수했다"의 증거</text>
  <text x="715" y="256" font-size="11" fill="#777">인간 승인 기록</text>
  <text x="715" y="274" font-size="11" fill="#777">필수</text>

  <line x1="725" y1="290" x2="840" y2="290" stroke="#ddd" stroke-width="0.5"/>
  <text x="715" y="310" font-size="11" font-weight="bold" fill="#666">원칙:</text>
  <text x="715" y="330" font-size="11" fill="#777">증거 ≠ 주장</text>
  <text x="715" y="348" font-size="11" fill="#777">감사 로그 =</text>
  <text x="715" y="366" font-size="11" fill="#777">사용자+데이터+</text>
  <text x="715" y="384" font-size="11" fill="#777">타임스탬프</text>

  <!-- Foundation bar -->
  <rect x="40" y="430" width="825" height="36" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="0.5"/>
  <text x="452" y="453" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">공통 기반: 구조화된 텍스트 + 버전 관리 + 검증 가능성</text>

  <!-- Bottom note -->
  <text x="450" y="490" text-anchor="middle" font-size="11" font-style="italic" fill="#999">네 기둥 중 하나라도 무너지면 조직은 "기억을 잃은 상태"로 운영된다</text>
</svg>