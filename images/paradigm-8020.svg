<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Palatino Linotype, Palatino, Georgia, serif">
  <rect width="900" height="340" fill="#fafafa" rx="4"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">80/20 역설 -- AI가 빠르게 만드는 것과 느리게 만드는 것</text>
  <line x1="100" y1="50" x2="800" y2="50" stroke="#999" stroke-width="0.5"/>

  <!-- 80% bar -->
  <rect x="60" y="80" width="640" height="100" rx="6" fill="#ddd" stroke="#999" stroke-width="1"/>
  <text x="380" y="120" text-anchor="middle" font-size="24" font-weight="bold" fill="#666">80%</text>
  <text x="380" y="148" text-anchor="middle" font-size="14" fill="#888">AI가 수 분 만에 생성하는 기능</text>
  <text x="380" y="168" text-anchor="middle" font-size="11" fill="#aaa">CRUD, UI 컴포넌트, 보일러플레이트, API 연동, 기본 로직</text>

  <!-- 20% bar -->
  <rect x="700" y="80" width="160" height="100" rx="6" fill="#555" stroke="#444" stroke-width="1.5"/>
  <text x="780" y="120" text-anchor="middle" font-size="24" font-weight="bold" fill="#fff">20%</text>
  <text x="780" y="148" text-anchor="middle" font-size="12" fill="#ccc">정제 필요</text>
  <text x="780" y="168" text-anchor="middle" font-size="10" fill="#aaa">보안, 엣지케이스</text>

  <!-- Time bars (inverted) -->
  <text x="60" y="215" font-size="13" font-weight="bold" fill="#666">소요 시간</text>

  <rect x="200" y="200" width="160" height="45" rx="4" fill="#ccc" stroke="#999" stroke-width="0.5"/>
  <text x="280" y="228" text-anchor="middle" font-size="16" font-weight="bold" fill="#666">20%</text>

  <rect x="360" y="200" width="500" height="45" rx="4" fill="#444" stroke="#333" stroke-width="1"/>
  <text x="610" y="228" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">80%</text>
  <text x="610" y="240" text-anchor="middle" font-size="10" fill="#bbb">검증, 리뷰, 보안 패치, 리팩터링, 테스트</text>

  <!-- Arrows connecting -->
  <text x="380" y="195" text-anchor="middle" font-size="11" fill="#888">↕ 역전</text>
  <text x="780" y="195" text-anchor="middle" font-size="11" fill="#888">↕ 역전</text>

  <!-- Bottom insight -->
  <rect x="60" y="265" width="800" height="55" rx="5" fill="#f0f0f0"/>
  <text x="460" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">AI는 "쓰는 시간"을 극적으로 줄이지만, "검증하는 시간"을 극적으로 늘린다</text>
  <text x="460" y="307" text-anchor="middle" font-size="11" fill="#666">침묵하는 기술 부채: AI 생성 코드의 중복(1.87배)은 정상 작동하므로 리뷰어가 잡지 못한다</text>
</svg>