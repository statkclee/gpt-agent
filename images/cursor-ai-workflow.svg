<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .tufte-text {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #333;
        font-size: 14px;
      }
      .tufte-title {
        font-family: Palatino, 'Book Antiqua', Georgia, serif;
        fill: #111;
        font-size: 18px;
        font-weight: bold;
      }
      .box {
        fill: #fff;
        stroke: #333;
        stroke-width: 1.5;
      }
      .box-dashed {
        fill: #fff;
        stroke: #666;
        stroke-width: 1;
        stroke-dasharray: 4;
      }
      .arrow {
        stroke: #333;
        stroke-width: 1.5;
        fill: none;
        marker-end: url(#arrowhead);
      }
      .arrow-dashed {
        stroke: #666;
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 4;
        marker-end: url(#arrowhead-gray);
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="tufte-title">Cursor AI Workflow Architecture</text>

  <!-- User Layer -->
  <rect x="50" y="100" width="150" height="300" class="box-dashed" rx="5" ry="5"/>
  <text x="125" y="80" text-anchor="middle" class="tufte-text" font-weight="bold">User Interaction</text>
  
  <rect x="70" y="130" width="110" height="40" class="box" rx="3" ry="3"/>
  <text x="125" y="155" text-anchor="middle" class="tufte-text">Tab (Predict)</text>

  <rect x="70" y="200" width="110" height="40" class="box" rx="3" ry="3"/>
  <text x="125" y="225" text-anchor="middle" class="tufte-text">Cmd+K (Edit)</text>

  <rect x="70" y="270" width="110" height="40" class="box" rx="3" ry="3"/>
  <text x="125" y="295" text-anchor="middle" class="tufte-text">Chat (Ask)</text>

  <rect x="70" y="340" width="110" height="40" class="box" rx="3" ry="3"/>
  <text x="125" y="365" text-anchor="middle" class="tufte-text">Composer</text>

  <!-- Cursor Engine Layer -->
  <rect x="250" y="100" width="300" height="300" class="box" rx="5" ry="5"/>
  <text x="400" y="80" text-anchor="middle" class="tufte-text" font-weight="bold">Cursor AI Engine</text>

  <!-- Context Bubble -->
  <ellipse cx="400" cy="160" rx="120" ry="40" class="box-dashed"/>
  <text x="400" y="150" text-anchor="middle" class="tufte-text" font-style="italic">Context Awareness</text>
  <text x="400" y="170" text-anchor="middle" class="tufte-text" font-size="12px">Current File, Codebase Index, Docs</text>

  <!-- LLM Processing -->
  <rect x="300" y="220" width="200" height="60" class="box" rx="3" ry="3"/>
  <text x="400" y="245" text-anchor="middle" class="tufte-text">LLM Inference</text>
  <text x="400" y="265" text-anchor="middle" class="tufte-text" font-size="12px">(Claude 3.5 Sonnet, GPT-4o)</text>

  <!-- Action/Diff -->
  <rect x="300" y="320" width="200" height="50" class="box" rx="3" ry="3"/>
  <text x="400" y="350" text-anchor="middle" class="tufte-text">Diff & Apply</text>

  <!-- Codebase Layer -->
  <rect x="600" y="100" width="150" height="300" class="box-dashed" rx="5" ry="5"/>
  <text x="675" y="80" text-anchor="middle" class="tufte-text" font-weight="bold">Project Codebase</text>

  <path d="M 640 140 L 710 140 L 710 180 L 640 180 Z" class="box"/>
  <text x="675" y="165" text-anchor="middle" class="tufte-text">Files</text>

  <path d="M 640 210 L 710 210 L 710 250 L 640 250 Z" class="box"/>
  <text x="675" y="235" text-anchor="middle" class="tufte-text">Terminal</text>
  
  <path d="M 640 280 L 710 280 L 710 320 L 640 320 Z" class="box"/>
  <text x="675" y="305" text-anchor="middle" class="tufte-text">.cursorrules</text>

  <!-- Arrows -->
  <!-- User to Engine -->
  <path d="M 180 150 L 250 160" class="arrow"/>
  <path d="M 180 220 L 250 240" class="arrow"/>
  <path d="M 180 290 L 250 260" class="arrow"/>
  <path d="M 180 360 L 280 350" class="arrow"/>

  <!-- Engine Internal -->
  <path d="M 400 190 L 400 220" class="arrow"/>
  <path d="M 400 280 L 400 320" class="arrow"/>

  <!-- Engine to Codebase -->
  <path d="M 500 345 L 600 345" class="arrow"/>
  
  <!-- Codebase Feedback -->
  <path d="M 600 160 Q 550 160 520 160" class="arrow-dashed"/>
  <path d="M 600 300 Q 550 300 500 260" class="arrow-dashed"/>

</svg>