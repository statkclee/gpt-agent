<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Palatino Linotype, Georgia, serif">
  <rect width="900" height="460" fill="#FEFEFE"/>

  <!-- Header (no emoji, text only) -->
  <text x="50" y="30" font-size="10.5" fill="#555" letter-spacing="1.5px">과잉 투입 · 과소 투입 — 둘 다 비용이다</text>
  <line x1="50" y1="38" x2="630" y2="38" stroke="#003876" stroke-width="1" opacity="0.2"/>

  <!-- Quadrant frame (outline only, no colored fills) -->
  <rect x="52" y="50" width="450" height="340" fill="none" stroke="#003876" stroke-width="0.8" opacity="0.3"/>
  <line x1="277" y1="50" x2="277" y2="390" stroke="#003876" stroke-width="0.5" opacity="0.2"/>
  <line x1="52" y1="220" x2="502" y2="220" stroke="#003876" stroke-width="0.5" opacity="0.2"/>

  <!-- Quadrant headers (text only, no colored fills) -->
  <text x="164" y="70" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="700">과잉 투입</text>
  <text x="389" y="70" text-anchor="middle" font-size="12" fill="#003876" font-weight="700">적합</text>
  <text x="164" y="240" text-anchor="middle" font-size="12" fill="#003876" font-weight="700">적합</text>
  <text x="389" y="240" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="700">과소 투입</text>

  <!-- TL: 과잉 투입 -->
  <text x="164" y="90" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Lv.1 문서에 LaTeX · Quarto 사용</text>
  <text x="66" y="108" font-size="9.5" fill="#003876" font-weight="600">증상</text>
  <line x1="66" y1="113" x2="265" y2="113" stroke="#003876" stroke-width="0.5" opacity="0.1"/>
  <text x="70" y="130" font-size="10.5" fill="#555">설치·설정에 수 시간 소요</text>
  <text x="70" y="148" font-size="10.5" fill="#555">팀원이 편집·공유 불가</text>
  <text x="70" y="166" font-size="10.5" fill="#555">학습 비용 > 문서 가치</text>
  <text x="164" y="195" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="600">→ 도구를 낮춰라</text>

  <!-- TR: 적합 (high) -->
  <text x="389" y="90" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Lv.3–4 분석 · 논문 · 자동화</text>
  <text x="289" y="108" font-size="9.5" fill="#003876" font-weight="600">도구 예시</text>
  <line x1="289" y1="113" x2="490" y2="113" stroke="#003876" stroke-width="0.5" opacity="0.1"/>
  <text x="293" y="130" font-size="10.5" fill="#555">Quarto + R · Python</text>
  <text x="293" y="148" font-size="10.5" fill="#555">코드·수식·재현성 내장</text>
  <text x="293" y="166" font-size="10.5" fill="#555">GitHub Actions 자동 빌드</text>
  <text x="389" y="195" text-anchor="middle" font-size="11" fill="#003876" font-weight="600">복잡도 = 도구 → 최대 효율</text>

  <!-- BL: 적합 (low) -->
  <text x="164" y="260" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Lv.0–1 메모 · 간단 보고서</text>
  <text x="66" y="278" font-size="9.5" fill="#003876" font-weight="600">도구 예시</text>
  <line x1="66" y1="283" x2="265" y2="283" stroke="#003876" stroke-width="0.5" opacity="0.1"/>
  <text x="70" y="300" font-size="10.5" fill="#555">메모앱 · Word · 구글 Docs</text>
  <text x="70" y="318" font-size="10.5" fill="#555">즉각 작성·공유 가능</text>
  <text x="70" y="336" font-size="10.5" fill="#555">간단 서식으로 충분</text>
  <text x="164" y="365" text-anchor="middle" font-size="11" fill="#003876" font-weight="600">복잡도 = 도구 → 최대 효율</text>

  <!-- BR: 과소 투입 -->
  <text x="389" y="260" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Lv.3 분석 보고서에 Word · HWP</text>
  <text x="289" y="278" font-size="9.5" fill="#003876" font-weight="600">증상</text>
  <line x1="289" y1="283" x2="490" y2="283" stroke="#003876" stroke-width="0.5" opacity="0.1"/>
  <text x="293" y="300" font-size="10.5" fill="#555">데이터 변경 → 전체 수작업</text>
  <text x="293" y="318" font-size="10.5" fill="#555">그래프 복붙 오류·불일치</text>
  <text x="293" y="336" font-size="10.5" fill="#555">6개월 후 재현 불가</text>
  <text x="389" y="365" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="600">→ 도구를 올려라</text>

  <!-- Diagonal (matching zone) — 텍스트를 대각선 중앙 위 빈 공간에 배치 -->
  <line x1="52" y1="390" x2="502" y2="50" stroke="#003876" stroke-width="1.2" stroke-dasharray="8,5" opacity="0.15"/>
  <text x="350" y="145" font-size="10" fill="#003876" font-style="italic" opacity="0.5">이상적 매칭 ↗</text>

  <!-- Axes -->
  <text x="164" y="405" text-anchor="middle" font-size="10" fill="#555">낮음 (Lv.0–1)</text>
  <text x="389" y="405" text-anchor="middle" font-size="10" fill="#555">높음 (Lv.3–4)</text>
  <text x="277" y="420" text-anchor="middle" font-size="10" fill="#888">문서 복잡도</text>

  <text transform="rotate(-90)" x="-220" y="38" text-anchor="middle" font-size="10" fill="#888">도구 복잡도</text>

  <!-- Bottom principle -->
  <line x1="55" y1="435" x2="60" y2="435" stroke="#003876" stroke-width="2.5"/>
  <text x="70" y="439" font-size="11" fill="#444">복잡도가 커질 것 같다면 처음부터 상위 도구 — 진입 비용은 1회, 수작업 비용은 매번</text>

  <!-- Margin notes -->
  <text x="710" y="55" font-size="10" fill="#888" font-style="italic">진단 신호</text>
  <text x="710" y="72" font-size="9.5" fill="#888">"설정이 너무 복잡해"</text>
  <text x="710" y="87" font-size="9.5" fill="#888">"팀원이 못 쓴다"</text>
  <text x="710" y="104" font-size="9.5" fill="#c0392b" font-style="italic">→ 과잉 투입</text>

  <text x="710" y="140" font-size="9.5" fill="#888">"매번 수작업이야"</text>
  <text x="710" y="155" font-size="9.5" fill="#888">"재현이 안 돼"</text>
  <text x="710" y="172" font-size="9.5" fill="#c0392b" font-style="italic">→ 과소 투입</text>

  <text x="710" y="225" font-size="10" fill="#888" font-style="italic">황금률</text>
  <text x="710" y="242" font-size="9.5" fill="#888">Lv 예측 +1 이상의</text>
  <text x="710" y="257" font-size="9.5" fill="#888">도구로 시작</text>

  <text x="710" y="310" font-size="10" fill="#888" font-style="italic">적합 도구</text>
  <text x="710" y="327" font-size="9.5" fill="#888">Lv.0–1 → 메모앱</text>
  <text x="710" y="342" font-size="9.5" fill="#888">Lv.2 → LaTeX</text>
  <text x="710" y="357" font-size="9.5" fill="#888">Lv.3–4 → Quarto</text>

  <line x1="50" y1="448" x2="630" y2="448" stroke="#eee" stroke-width="0.5"/>
</svg>