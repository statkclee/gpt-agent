# ── AI 핵심 개념 ──────────────────────────

LLM: |
  대규모 언어 모델(Large Language Model). 대량의 텍스트 데이터로 사전 학습한
  딥러닝 모델로, 자연어 이해와 생성 능력을 갖춘다.
  GPT, Claude, Gemini 등이 대표적이다.

AI 에이전트: |
  AI Agent. 사용자의 목표를 이해하고, 스스로 계획을 세워 도구를 활용하며,
  반복적으로 작업을 수행하는 자율적 AI 시스템이다.
  단순 챗봇과 달리 환경과 상호작용하며 복잡한 작업을 수행한다.

토큰: |
  Token. LLM이 텍스트를 처리하는 최소 단위다.
  영어 단어 하나는 보통 1~2개 토큰, 한글은 글자당 2~3개 토큰에 해당한다.
  모델의 입출력 비용과 제한은 토큰 단위로 측정한다.

컨텍스트 윈도우: |
  Context Window. LLM이 한 번에 처리할 수 있는 최대 토큰 수다.
  입력 프롬프트와 출력 응답을 합친 크기가 이 한도를 넘을 수 없다.
  GPT-4는 128K, Claude는 200K 토큰을 지원한다.

할루시네이션: |
  Hallucination. LLM이 사실이 아닌 정보를 그럴듯하게 생성하는 현상이다.
  학습 데이터에 없거나 잘못된 내용을 자신감 있게 출력한다.
  RAG, 사실 검증 등으로 완화할 수 있다.

멀티모달: |
  Multimodal. 텍스트뿐 아니라 이미지, 오디오, 비디오 등 여러 유형의
  데이터를 동시에 처리하는 AI 모델의 능력이다.
  GPT-4o, Claude 3 등이 멀티모달을 지원한다.

임베딩: |
  Embedding. 텍스트, 이미지 등의 데이터를 고차원 벡터 공간의 수치 벡터로
  변환하는 기법이다. 의미적으로 유사한 데이터는 벡터 공간에서 가까이 위치한다.
  검색, 분류, 추천 시스템의 기반 기술이다.

파인튜닝: |
  Fine-tuning. 사전 학습된 LLM을 특정 도메인이나 작업에 맞게
  추가 학습시키는 과정이다. 전체 모델을 처음부터 학습하는 것보다
  적은 데이터와 비용으로 성능을 개선할 수 있다.

# ── 프롬프트와 컨텍스트 ────────────────────

프롬프트: |
  Prompt. LLM에 전달하는 입력 텍스트다. 질문, 지시, 예시 등을 포함하며,
  모델의 응답 품질을 결정하는 핵심 요소다.

프롬프트 엔지니어링: |
  Prompt Engineering. LLM에서 원하는 결과를 얻기 위해 프롬프트를
  체계적으로 설계하고 최적화하는 기법이다. 제로샷, 퓨샷, 체인오브소트 등
  다양한 전략이 있다.

컨텍스트 엔지니어링: |
  Context Engineering. 프롬프트 엔지니어링의 확장 개념으로, 시스템
  프롬프트, 사용자 컨텍스트, 외부 지식, 도구 정보를 종합적으로 설계하여
  LLM의 성능을 극대화하는 방법론이다.

시스템 프롬프트: |
  System Prompt. LLM의 역할, 행동 규칙, 응답 형식을 정의하는
  지시문이다. 사용자 프롬프트보다 먼저 처리되어 모델의 기본 동작을 결정한다.

체인오브소트: |
  Chain-of-Thought (CoT). LLM이 최종 답변에 도달하기 전에 중간 추론
  단계를 명시적으로 생성하도록 유도하는 프롬프트 기법이다.
  복잡한 문제에서 정확도를 크게 향상시킨다.

# ── AI 코딩 패러다임 ──────────────────────

바이브 코딩: |
  Vibe Coding. 개발자가 코드를 직접 작성하지 않고, 자연어로 의도를
  전달하면 AI가 코드를 생성하는 프로그래밍 방식이다.
  Andrej Karpathy가 명명한 개념으로, 코드보다 의도에 집중한다.

에이전트 코딩: |
  Agent Coding. AI 에이전트가 코드 작성, 테스트, 디버깅, 배포까지
  자율적으로 수행하는 프로그래밍 패러다임이다.
  개발자는 목표를 설정하고 결과를 검증하는 역할로 전환한다.

페어 프로그래밍: |
  Pair Programming. 두 명이 하나의 컴퓨터에서 함께 코딩하는 방식이다.
  AI 시대에는 인간-AI 페어 프로그래밍으로 확장되어,
  AI가 코드를 생성하고 인간이 검토하는 형태로 진화했다.

코드 리뷰: |
  Code Review. 작성된 코드를 다른 개발자(또는 AI)가 검토하여 오류,
  보안 취약점, 개선 가능성을 발견하는 품질 관리 활동이다.

리팩토링: |
  Refactoring. 소프트웨어의 외부 동작을 변경하지 않으면서 내부 구조를
  개선하는 과정이다. 코드 가독성, 유지보수성, 성능 향상이 목적이다.

# ── AI 도구와 서비스 ──────────────────────

API: |
  Application Programming Interface. 소프트웨어 간 통신을 위한
  규약이다. LLM API는 HTTP 요청으로 모델에 프롬프트를 전달하고
  응답을 받는 인터페이스를 제공한다.

SDK: |
  Software Development Kit. API를 프로그래밍 언어별로 쉽게 사용할 수
  있도록 패키징한 라이브러리다. OpenAI Python SDK, Anthropic SDK 등이 있다.

RAG: |
  검색 증강 생성(Retrieval-Augmented Generation). LLM이 응답을
  생성하기 전에 외부 지식 베이스에서 관련 정보를 검색하여 컨텍스트에
  추가하는 기법이다. 할루시네이션을 줄이고 최신 정보를 반영할 수 있다.

Function Calling: |
  함수 호출. LLM이 외부 도구나 API를 호출할 수 있도록 하는 기능이다.
  모델이 자연어 요청을 분석하여 적절한 함수와 인자를 결정하고,
  실행 결과를 응답에 통합한다.

MCP: |
  Model Context Protocol. Anthropic이 제안한 개방형 프로토콜로,
  AI 모델이 외부 도구, 데이터 소스, 서비스와 표준화된 방식으로
  통신할 수 있게 한다. 도구 통합의 표준을 지향한다.

Ollama: |
  로컬 환경에서 오픈소스 LLM을 쉽게 실행할 수 있게 해주는 도구다.
  Llama, Mistral, Gemma 등의 모델을 한 줄 명령으로 다운로드하고
  API 서버로 실행할 수 있다.

GitHub Copilot: |
  GitHub와 OpenAI가 개발한 AI 코딩 어시스턴트다.
  IDE에 플러그인으로 설치하여 코드 자동 완성, 생성, 설명 기능을 제공한다.

Cursor: |
  VS Code를 포크하여 AI 기능을 네이티브로 통합한 코드 에디터다.
  자연어 코드 편집, 멀티파일 컨텍스트 인식, AI 에이전트 기능을 제공한다.

Claude Code: |
  Anthropic이 개발한 CLI 기반 AI 코딩 에이전트다. 터미널에서
  자연어 명령으로 코드 작성, 파일 편집, 테스트 실행, Git 작업 등을
  자율적으로 수행한다.

# ── IDE와 개발 환경 ──────────────────────

IDE: |
  통합 개발 환경(Integrated Development Environment). 코드 편집기,
  디버거, 빌드 도구, 터미널 등을 하나의 인터페이스에 통합한
  소프트웨어 개발 도구다. VS Code, Cursor, Positron 등이 있다.

LSP: |
  언어 서버 프로토콜(Language Server Protocol). IDE와 프로그래밍
  언어 지원 서버 간의 표준 통신 프로토콜이다. 자동 완성, 정의 이동,
  오류 진단 등의 기능을 언어와 에디터에 독립적으로 제공한다.

Extension Host: |
  VS Code 계열 에디터에서 확장 프로그램을 별도 프로세스로 실행하는
  아키텍처다. 확장 프로그램의 오류가 에디터 본체에 영향을 주지 않도록
  격리한다.

Positron: |
  Posit(구 RStudio)이 개발한 차세대 데이터 과학 IDE다.
  VS Code 기반으로 R과 Python을 동시에 지원하며,
  변수 탐색기, 데이터 뷰어, 플롯 패널을 내장한다.

Zed: |
  Rust로 작성된 고성능 코드 에디터다. GPU 가속 렌더링으로
  빠른 편집 환경을 제공하며, AI 어시스턴트와 실시간 협업 기능을 내장한다.

Quarto: |
  Posit이 개발한 오픈소스 과학기술 출판 시스템이다.
  마크다운 기반으로 R, Python, Julia 코드를 포함한 문서를
  HTML, PDF, Word, 슬라이드 등 다양한 형식으로 변환한다.

# ── Docker와 컨테이너 ─────────────────────

Docker: |
  컨테이너 기반 가상화 플랫폼이다. 애플리케이션과 실행 환경을
  하나의 패키지(이미지)로 묶어 어디서나 동일하게 실행할 수 있게 한다.
  개발 환경 재현성과 배포 일관성을 보장한다.

컨테이너: |
  Container. Docker 이미지를 실행한 인스턴스다. 호스트 OS의
  커널을 공유하면서도 파일 시스템, 네트워크, 프로세스를 격리한다.
  가상 머신보다 가볍고 빠르게 시작된다.

Docker 이미지: |
  Docker Image. 컨테이너를 생성하기 위한 읽기 전용 템플릿이다.
  운영체제, 런타임, 라이브러리, 애플리케이션 코드를 계층(레이어)
  구조로 포함한다. Dockerfile로 빌드한다.

Dockerfile: |
  Docker 이미지를 빌드하기 위한 명세 파일이다. 기반 이미지 선택,
  패키지 설치, 파일 복사, 환경 변수 설정 등의 명령어를 순서대로 기술한다.

볼륨: |
  Volume. Docker 컨테이너의 데이터를 영속적으로 저장하는 메커니즘이다.
  컨테이너가 삭제되어도 볼륨의 데이터는 유지된다.
  호스트와 컨테이너 간 파일 공유에도 사용한다.

Docker Hub: |
  Docker 이미지를 저장하고 공유하는 클라우드 레지스트리다.
  공식 이미지와 커뮤니티 이미지를 검색, 다운로드, 배포할 수 있다.

# ── Research Compendium ───────────────────

Research Compendium: |
  연구 결과의 재현성을 보장하기 위해 데이터, 코드, 문서를
  체계적으로 조직한 패키지다. 누구나 동일한 환경에서
  동일한 결과를 재현할 수 있도록 한다.

재현성: |
  Reproducibility. 동일한 데이터와 코드로 동일한 결과를 얻을 수 있는
  연구의 특성이다. 재현 가능한 연구는 데이터, 코드, 환경 정보를
  모두 공개하여 검증 가능성을 보장한다.

# ── 기타 핵심 용어 ──────────────────────

Git: |
  분산 버전 관리 시스템이다. 소스 코드의 변경 이력을 추적하고,
  여러 개발자가 동시에 작업할 수 있게 한다.
  브랜치, 머지, 커밋 등의 기능으로 협업을 지원한다.

파이프라인: |
  Pipeline. 데이터 처리나 소프트웨어 빌드의 자동화된 단계별 흐름이다.
  CI/CD 파이프라인은 코드 변경부터 테스트, 빌드, 배포까지를 자동화한다.

오픈소스: |
  Open Source. 소스 코드를 공개하여 누구나 사용, 수정, 배포할 수 있는
  소프트웨어 개발 방식이다. MIT, Apache, GPL 등의 라이선스로 배포한다.

마크다운: |
  Markdown. 간단한 문법으로 서식이 있는 문서를 작성하는 경량 마크업
  언어다. `#`은 제목, `**`은 굵게, `` ` ``은 코드 등의 문법을 사용한다.
  Quarto, GitHub, Jupyter 등에서 널리 사용한다.

# ── 운영체제 및 플랫폼 (한글화) ──────────────

파이썬: |
  Python. 간결한 문법과 풍부한 라이브러리를 갖춘 범용 프로그래밍 언어다.
  데이터 과학, 웹 개발, 자동화 등 다양한 분야에서 사용한다.

윈도우: |
  Windows. 마이크로소프트가 개발한 그래픽 사용자 인터페이스 기반 운영체제다.

맥OS: |
  macOS. 애플이 개발한 유닉스 기반 운영체제로 맥 컴퓨터에서 구동된다.

리눅스: |
  Linux. 리누스 토르발스가 시작한 오픈소스 운영체제 커널이다.
  서버, 클라우드, 임베디드 시스템에서 널리 사용한다.

우분투: |
  Ubuntu. 데비안 기반의 리눅스 배포판으로 데스크톱과 서버 환경에서
  가장 널리 사용되는 배포판 중 하나다.

데비안: |
  Debian. 자유 소프트웨어 원칙을 따르는 리눅스 배포판이다.
  우분투를 포함한 다수 배포판의 기반이 된다.

러스트: |
  Rust. 메모리 안전성과 높은 성능을 동시에 제공하는 시스템 프로그래밍
  언어다. 모질라에서 시작했으며, Zed 에디터가 러스트로 작성되었다.

파워셸: |
  PowerShell. 마이크로소프트가 개발한 명령줄 셸이자 스크립팅 언어다.
  윈도우 시스템 관리에 주로 사용한다.

아나콘다: |
  Anaconda. 데이터 과학용 파이썬 배포판이다.
  conda 패키지 관리자와 다수의 과학 라이브러리를 포함한다.

# ── 문서 도구 (한글화) ──────────────────────

판독: |
  Pandoc. 다양한 마크업 형식 간 문서를 변환하는 범용 도구다.
  쿼토(Quarto)의 핵심 변환 엔진이다.

타이니텍: |
  TinyTeX. 경량 LaTeX 배포판이다. 필요한 패키지만 자동으로 설치하여
  최소한의 디스크 공간을 사용한다.

# ── 개발 환경 (한글화) ──────────────────────

아톰: |
  Atom. GitHub이 개발한 일렉트론 기반 텍스트 에디터다.
  2022년 개발이 중단되었다.

일렉트론: |
  Electron. 웹 기술(HTML, CSS, JavaScript)로 크로스 플랫폼 데스크톱
  애플리케이션을 만드는 프레임워크다. VS Code, Atom 등이 일렉트론 기반이다.

# ── AI 도구 (한글화) ────────────────────────

챗GPT: |
  ChatGPT. OpenAI가 개발한 대화형 AI 도구다. GPT 시리즈 대규모 언어
  모델을 기반으로 자연어 대화를 수행한다.

클로드 소넷: |
  Claude Sonnet. Anthropic의 Claude 모델 중 성능과 속도의 균형을
  갖춘 AI 언어 모델이다.

제미나이: |
  Gemini. 구글이 개발한 멀티모달 AI 언어 모델이다.
  텍스트, 이미지, 코드 등 다양한 형식을 처리한다.

구글 앤티그래비티: |
  Google Antigravity. 구글이 제시한 에이전트 우선(Agent-first) 개발
  플랫폼 비전이다.

윈드서프: |
  Windsurf. Codeium이 개발한 AI 네이티브 통합 개발 환경이다.

# ── 글꼴 ──────────────────────────────────

프리텐다드: |
  Pretendard. 다양한 굵기를 지원하는 한글 가변 웹 폰트다.
  가독성이 뛰어나 UI와 문서에 널리 사용한다.

D2코딩: |
  D2Coding. 네이버에서 개발한 코딩 전용 한글 고정폭 폰트다.

# ── 워크플로우 자동화 ──────────────────────

스네이크메이크: |
  Snakemake. 파이썬 기반의 워크플로우 관리 도구다.
  재현 가능한 데이터 분석 파이프라인을 정의하고 실행한다.

# ── 회사 및 인명 ─────────────────────────

볼란드: |
  Borland. Turbo Pascal, Delphi 등을 개발한 소프트웨어 회사다.
  IDE 역사에서 중요한 역할을 했다.

젯브레인즈: |
  JetBrains. IntelliJ IDEA, PyCharm 등 전문 개발자용 IDE를 만드는
  소프트웨어 회사다.

포짓: |
  Posit. RStudio IDE와 Quarto를 개발하는 회사다.
  과거 RStudio라는 이름으로 알려져 있었다.

앤더스 헤일스버그: |
  Anders Hejlsberg. Turbo Pascal, Delphi, C#, TypeScript를 설계한
  덴마크 출신 프로그래머다.
